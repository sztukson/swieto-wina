<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Test UX — Święto Wina</title>
<style>
:root{
  --bg:#0d0b10;--s1:#171220;--s2:#1e1829;--s3:#27213a;--dim:#3a3250;
  --wine:#8b2030;--wine2:#b02a42;--gold:#c8a84b;--text:#ede5d8;--muted:#7a6f82;
  --border:rgba(200,168,75,.13);--green:#27ae60;--r:14px;--rsm:9px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100%;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh}
#hdr{background:linear-gradient(180deg,var(--s2),var(--s1));border-bottom:1px solid var(--border);padding:calc(8px + env(safe-area-inset-top)) 12px 8px;flex-shrink:0}
.htop{display:flex;align-items:center;justify-content:space-between;gap:8px}
.logo{font-family:Georgia,serif;font-size:16px;color:var(--gold);font-weight:bold}
.counter{font-size:11px;color:var(--muted);text-align:right;line-height:1.3}
.counter b{color:var(--gold);font-size:13px}
.seg{display:flex;gap:4px;margin-top:8px;background:var(--s3);border-radius:11px;padding:3px}
.seg button{flex:1;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:700;padding:8px 4px;border-radius:8px;cursor:pointer;transition:all .15s}
.seg button.on{background:var(--wine);color:#fff}
.navchips{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.paybar{display:flex;align-items:center;gap:4px;margin-top:8px;background:var(--s3);border-radius:11px;padding:3px}
.paybar .pl{font-size:10px;color:var(--muted);padding:0 4px 0 8px;flex-shrink:0;font-weight:700}
.paybar button{flex:1;border:none;background:transparent;color:var(--muted);font-size:11px;font-weight:700;padding:9px 2px;border-radius:8px;cursor:pointer;transition:all .15s}
.paybar button.on{color:#fff}
#p-gotówka.on{background:#2e7d4f}
#p-karta.on{background:#2f6fb0}
#p-blik.on{background:#7a3fb0}
.undo-bar{display:flex;align-items:center;gap:7px;margin-bottom:10px;background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.28);border-radius:11px;padding:7px 9px}
.ub-l{font-size:10px;color:var(--muted);font-weight:700;flex-shrink:0;text-transform:uppercase;letter-spacing:.3px}
.ub-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.ub-row::-webkit-scrollbar{display:none}
.ub-it{flex:0 0 auto;background:var(--s2);border:1px solid var(--border);color:var(--text);font-size:12px;font-weight:600;padding:7px 11px;border-radius:18px;cursor:pointer;white-space:nowrap}
.ub-it b{color:#e74c3c;margin-left:3px;font-size:13px}
.ub-it:active{background:var(--s3);transform:scale(.95)}
.ub-it.ub-red{border-color:rgba(176,42,66,.55);color:#e8808e}
.ub-it.ub-white{border-color:rgba(200,168,75,.5);color:#e0c878}
.ub-it.ub-rose{border-color:rgba(212,85,138,.55);color:#ec92bd}
/* popup wyboru */
#pick{position:fixed;inset:0;z-index:120;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.55);padding:24px}
#pick.show{display:flex}
.pick-c{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:18px;width:100%;max-width:330px;animation:pop .15s}
@keyframes pop{from{transform:scale(.9);opacity:.4}to{transform:scale(1);opacity:1}}
.pick-name{font-family:Georgia,serif;font-size:20px;text-align:center}
.pick-sub{font-size:12px;color:var(--muted);text-align:center;margin:3px 0 16px}
.pick-btn{display:flex;align-items:center;justify-content:center;width:100%;border:none;border-radius:13px;padding:18px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px}
.pick-btn:active{transform:scale(.96)}
.pick-dg{background:var(--wine);color:#fff}
.pick-bt{background:var(--s3);color:var(--gold);border:1px solid rgba(200,168,75,.4)}
.pick-cancel{background:transparent;border:none;color:var(--muted);font-size:13px;width:100%;padding:8px;cursor:pointer}
.pick-lbl{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin:12px 0 6px}
.pick-seg{display:flex;gap:6px}
.pick-seg button{flex:1;border:1px solid var(--border);background:var(--s2);color:var(--muted);font-size:12px;font-weight:700;padding:12px 4px;border-radius:10px;cursor:pointer;transition:all .12s}
.pick-seg button.on{border-color:var(--gold);color:var(--gold);background:rgba(200,168,75,.14)}
.pick-seg button:active{transform:scale(.95)}
.pick-disc{flex-wrap:wrap}
.pick-disc button{flex:1 1 28%}
.pick-total{text-align:center;font-size:14px;margin:14px 0 10px;color:var(--text)}
.pick-total b{color:var(--gold);font-size:19px}
.pick-confirm{background:var(--green);color:#fff}
.pick-back{display:block;width:100%;background:var(--s3);border:1.5px solid var(--gold);color:var(--gold);border-radius:13px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;margin-top:4px}
.pick-back:active{transform:scale(.96);background:rgba(200,168,75,.12)}
.custom-row{display:flex;gap:6px;margin-top:6px}
.custom-row button{flex:0 0 54px;border:1px solid var(--border);background:var(--s2);color:var(--muted);font-size:15px;font-weight:800;border-radius:9px;cursor:pointer}
.custom-row button.on{border-color:var(--gold);color:var(--gold);background:rgba(200,168,75,.16)}
.custom-row input{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:16px;padding:10px 12px;outline:none;text-align:center}
.custom-big{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:24px;font-weight:700;padding:16px;outline:none;text-align:center;margin-bottom:4px}
.custom-big:focus{border-color:var(--gold)}
.navchip{border:1px solid var(--border);background:var(--s2);color:var(--muted);font-size:11px;font-weight:700;padding:6px 10px;border-radius:20px;cursor:pointer;transition:all .15s}
.navchip.on{border-color:var(--gold);color:var(--gold);background:rgba(200,168,75,.12)}
#cnt{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 10px 30px}
.hint{font-size:11px;color:var(--muted);text-align:center;padding:8px;font-style:italic}
/* ── pole szukania ── */
#searchbar{margin-bottom:10px}
#searchbar input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text);font-size:15px;padding:12px;outline:none}
/* ── chipsy kategorii ── */
#catchips{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;-ms-overflow-style:none}
#catchips::-webkit-scrollbar,.fav-row::-webkit-scrollbar{display:none;width:0;height:0}
#catchips button{white-space:nowrap;border:1px solid var(--border);background:var(--s2);color:var(--muted);font-size:13px;font-weight:700;padding:8px 14px;border-radius:20px;cursor:pointer}
#catchips button.on{background:var(--gold);color:#1a1410;border-color:var(--gold)}
/* ── pasek ulubionych ── */
#favbar{margin-bottom:12px}
.fav-title{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px;font-weight:700}
.fav-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-ms-overflow-style:none}
.fav-it{flex:0 0 auto;background:linear-gradient(160deg,var(--s2),var(--s1));border:1px solid var(--gold2,rgba(200,168,75,.3));border-radius:12px;padding:10px 12px;min-width:110px;cursor:pointer;transition:transform .1s}
.fav-it:active{transform:scale(.94)}
.fav-it .fn{font-family:Georgia,serif;font-size:13px;color:var(--gold);font-weight:bold}
.fav-it .fb{display:flex;gap:6px;margin-top:7px}
.fav-it .fb span{flex:1;text-align:center;background:var(--wine);color:#fff;border-radius:7px;padding:7px 0;font-size:13px;font-weight:700}
/* ── sekcja kategorii ── */
.sec{margin-bottom:8px}
.sec-h{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--s2);border:1px solid var(--border);border-radius:10px;cursor:pointer}
.sec-h .st{font-family:Georgia,serif;font-size:14px;color:var(--gold);text-transform:uppercase;letter-spacing:.5px}
.sec-h .sa{color:var(--muted)}
.sec-body{margin-top:6px;display:flex;flex-direction:column;gap:6px}
/* ── MODEL A: szybka sprzedaż z listy ── */
.row{background:var(--s1);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.row-top{display:flex;align-items:center;gap:10px;padding:11px 12px;cursor:pointer}
.row-name{flex:1;min-width:0}
.row-name .rn{font-family:Georgia,serif;font-size:14px;color:var(--text)}
.row-name .rs{font-size:10px;color:var(--muted);margin-top:2px}
.row-stock{text-align:right}
.row-stock .rv{font-size:20px;font-weight:700;line-height:1}
.row-stock .rl{font-size:9px;color:var(--muted)}
.row-quick{display:flex;gap:6px;padding:0 12px 11px}
.qbtn{flex:1;border:none;border-radius:9px;height:48px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:transform .08s}
.qbtn:active{transform:scale(.9)}
.qdg{background:var(--wine);color:#fff}
.qbt{background:var(--s3);color:var(--gold);border:1px solid var(--gold2,rgba(200,168,75,.35))}
.row-detail{border-top:1px solid var(--border);padding:12px;font-size:12px;color:var(--muted);background:rgba(255,255,255,.02)}
/* ── MODEL C: kafelki ── */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(min-width:520px){.grid{grid-template-columns:1fr 1fr 1fr}}
.tile{background:linear-gradient(160deg,var(--s2),var(--s1));border:1px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer;transition:transform .08s;-webkit-user-select:none;user-select:none}
.tile:active{transform:scale(.93);border-color:var(--wine)}
.tile.flash{animation:fl .4s}
@keyframes fl{0%{background:var(--wine)}100%{background:var(--s1)}}
.tile .tn{font-family:Georgia,serif;font-size:14px;color:var(--gold);font-weight:bold;line-height:1.15}
.tile .tcounts{display:flex;justify-content:center;gap:16px;margin-top:9px}
.tile .tcounts span{font-size:19px;font-weight:700}
.tile .ts{font-size:11px;color:var(--muted);margin-top:5px}
/* kolory wg koloru wina */
.tile.t-red{background:linear-gradient(160deg,#3a1820,#220f15);border-color:rgba(176,42,66,.5)}
.tile.t-red .tn{color:#e8808e}
.tile.t-red .tcounts span{color:#e8808e}
.tile.t-white{background:linear-gradient(160deg,#2c2718,#1a1710);border-color:rgba(200,168,75,.45)}
.tile.t-white .tn{color:#e0c878}
.tile.t-white .tcounts span{color:#e0c878}
.tile.t-rose{background:linear-gradient(160deg,#3a2030,#24141d);border-color:rgba(212,85,138,.5)}
.tile.t-rose .tn{color:#ec92bd}
.tile.t-rose .tcounts span{color:#ec92bd}
/* ── MODEL B: bottom sheet ── */
.list-simple{display:flex;flex-direction:column;gap:6px}
.ls-it{display:flex;justify-content:space-between;align-items:center;background:var(--s1);border:1px solid var(--border);border-radius:11px;padding:13px 14px;cursor:pointer}
.ls-it:active{background:var(--s2)}
.ls-it .lsn{font-family:Georgia,serif;font-size:14px}
.ls-it .lss{font-size:11px;color:var(--muted)}
#sheet{position:fixed;inset:0;z-index:100;display:none;align-items:flex-end;background:rgba(0,0,0,.5)}
#sheet.show{display:flex}
.sheet-c{background:var(--s1);border-top:2px solid var(--wine);border-radius:20px 20px 0 0;width:100%;max-width:560px;margin:0 auto;padding:16px 16px calc(16px + env(safe-area-inset-bottom));animation:up .2s}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-name{font-family:Georgia,serif;font-size:18px;color:var(--gold);text-align:center}
.sheet-sub{font-size:12px;color:var(--muted);text-align:center;margin:2px 0 14px}
.sheet-ag{margin-bottom:12px}
.sheet-lbl{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:6px}
.sheet-row{display:flex;gap:8px}
.sheet-row .minus{flex:0 0 56px;background:var(--s3);border:1px solid var(--dim);color:var(--muted);border-radius:10px;height:58px;font-size:24px;cursor:pointer}
.sheet-row .plus{flex:1;background:var(--wine);border:none;color:#fff;border-radius:10px;height:58px;font-size:15px;font-weight:700;cursor:pointer}
.sheet-row .plus:active,.sheet-row .minus:active{opacity:.7}
.sheet-close{width:100%;margin-top:6px;background:var(--s3);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer}
#toast{position:fixed;top:46%;left:50%;transform:translate(-50%,-50%) scale(.9);background:var(--s3);border:1px solid var(--gold2,rgba(200,168,75,.5));color:var(--text);padding:11px 22px;border-radius:30px;font-size:14px;font-weight:700;z-index:200;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="htop">
      <div class="logo">🍷 Test UX</div>
      <div class="counter">Dziś: <b id="c-dg">0</b>🥂 <b id="c-bt">0</b>🍾<br><b id="c-rev">0</b> zł <span onclick="resetCnt()" style="color:var(--muted);cursor:pointer;text-decoration:underline">reset</span></div>
    </div>
    <div class="seg">
      <button id="m-grid" class="on" onclick="setModel('grid')">▦ Kafelki</button>
      <button id="m-list" onclick="setModel('list')">📋 Lista</button>
      <button id="m-sheet" onclick="setModel('sheet')">⬆️ Panel</button>
    </div>
    <div class="navchips" id="navchips">
      <button class="navchip" id="n-fav" onclick="toggleNav('fav')">⭐ Ulubione</button>
      <button class="navchip" id="n-chips" onclick="toggleNav('chips')">🎨 Kolor wina</button>
      <button class="navchip" id="n-search" onclick="toggleNav('search')">🔍 Szukanie</button>
    </div>
  </div>
  <div id="cnt"></div>
</div>

<!-- Bottom sheet (model B) -->
<div id="sheet" onclick="if(event.target===this)closeSheet()">
  <div class="sheet-c" id="sheet-c"></div>
</div>
<!-- Popup wyboru degustacja/butelka (model kafelki) -->
<div id="pick" onclick="if(event.target===this)closePick()">
  <div class="pick-c" id="pick-c"></div>
</div>
<div id="toast"></div>

<script>
// ── Dane testowe ──
var WINES = [
  {id:'w1', name:'Cabernet Sauvignon', type:'czerwone', dgPrice:12, btPrice:55, stock:12, dg:0, bt:0},
  {id:'w2', name:'Merlot', type:'czerwone', dgPrice:12, btPrice:50, stock:5, dg:0, bt:0},
  {id:'w3', name:'Pinot Noir', type:'czerwone', dgPrice:14, btPrice:60, stock:8, dg:0, bt:0},
  {id:'w4', name:'Chardonnay', type:'białe', dgPrice:11, btPrice:48, stock:10, dg:0, bt:0},
  {id:'w5', name:'Riesling', type:'białe', dgPrice:11, btPrice:45, stock:9, dg:0, bt:0},
  {id:'w6', name:'Sauvignon Blanc', type:'białe', dgPrice:12, btPrice:50, stock:7, dg:0, bt:0},
  {id:'w7', name:'Rosé Provence', type:'różowe', dgPrice:13, btPrice:52, stock:6, dg:0, bt:0},
  {id:'w8', name:'Zinfandel Rosé', type:'różowe', dgPrice:12, btPrice:48, stock:4, dg:0, bt:0}
];
var CATS = ['czerwone','białe','różowe'];
var CAT_ICON = {czerwone:'🍷', 'białe':'🥂', różowe:'🌸'};
var MODEL = 'grid';
var PAY = 'gotówka';
var PAY_ICON = {gotówka:'💵', karta:'💳', blik:'📱'};
var NAV = {fav:false, chips:false, search:false};
var ACTIVE_CAT = 'all';
var SEARCH = '';
var SEC_OPEN = {czerwone:true, 'białe':false, różowe:false};
var SOLD = {dg:0, bt:0, rev:0};
var TCLASS = {czerwone:'t-red', 'białe':'t-white', różowe:'t-rose'};
var UCLASS = {czerwone:'ub-red', 'białe':'ub-white', różowe:'ub-rose'};
var LOG = [];     // ostatnie akcje do cofania
var SEQ = 0;
var PICK = null;  // stan popupa: {id,kind,pay,discType,discVal}

function buzz(ms){ if(navigator.vibrate) navigator.vibrate(ms||14); }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove('show');},1100); }
function fmt(n){ return n.toLocaleString('pl-PL'); }

function sell(id, kind, opts){
  opts = opts || {};
  var w = WINES.find(function(x){return x.id===id;});
  if(!w) return;
  if(kind==='bt' && w.stock<=0){ toast('⚠️ Brak butelek!'); buzz([30,40,30]); return; }
  var pay  = opts.pay || PAY;
  var base = kind==='dg' ? w.dgPrice : w.btPrice;
  var disc = opts.discAmt || 0;
  var amt  = Math.max(0, base - disc);
  if(kind==='dg'){ w.dg++; SOLD.dg++; } else { w.stock--; w.bt++; SOLD.bt++; }
  SOLD.rev += amt;
  PAY = pay; // zapamiętaj ostatnią płatność
  LOG.push({seq:++SEQ, wineId:id, name:w.name, kind:kind, pay:pay, amt:amt, type:w.type, disc:opts.discLabel||null});
  buzz(14);
  toast((kind==='dg'?'🥂 ':'🍾 ')+w.name+'  '+PAY_ICON[pay]+(opts.discLabel?' '+opts.discLabel:''));
  updCounter();
  render();
}
// Cofnij konkretną akcję z loga (odwraca sprzedaż)
function undoAction(seq){
  var i = -1;
  for(var k=0;k<LOG.length;k++){ if(LOG[k].seq===seq){ i=k; break; } }
  if(i<0) return;
  var a = LOG[i];
  var w = WINES.find(function(x){return x.id===a.wineId;});
  if(w){
    if(a.kind==='dg'){ if(w.dg>0){w.dg--; SOLD.dg--; SOLD.rev-=a.amt;} }
    else { if(w.bt>0){w.bt--; w.stock++; SOLD.bt--; SOLD.rev-=a.amt;} }
  }
  LOG.splice(i,1);
  buzz([15,30,15]);
  toast('↩️ Cofnięto: '+(a.kind==='dg'?'🥂 ':'🍾 ')+a.name);
  updCounter();
  render();
}
function updCounter(){
  document.getElementById('c-dg').textContent = SOLD.dg;
  document.getElementById('c-bt').textContent = SOLD.bt;
  document.getElementById('c-rev').textContent = fmt(SOLD.rev);
}
function resetCnt(){ SOLD={dg:0,bt:0,rev:0}; LOG=[]; SEQ=0; WINES.forEach(function(w){w.dg=0;w.bt=0;}); updCounter(); render(); toast('↩️ Reset'); }

function setModel(m){ MODEL=m; ['list','sheet','grid'].forEach(function(x){document.getElementById('m-'+x).classList.toggle('on',x===m);}); buzz(8); render(); }
function toggleNav(k){ NAV[k]=!NAV[k]; document.getElementById('n-'+k).classList.toggle('on',NAV[k]); buzz(8); render(); }
function toggleSec(c){ SEC_OPEN[c]=!SEC_OPEN[c]; render(); }
function setCat(c){ ACTIVE_CAT=c; render(); }

function filtered(){
  return WINES.filter(function(w){
    if(SEARCH && w.name.toLowerCase().indexOf(SEARCH.toLowerCase())===-1) return false;
    if(NAV.chips && ACTIVE_CAT!=='all' && w.type!==ACTIVE_CAT) return false;
    return true;
  });
}

function render(){
  var h='';
  // Pasek cofania — ostatnie akcje (działa we wszystkich modelach)
  if(LOG.length){
    h+='<div class="undo-bar"><span class="ub-l">↩️ Cofnij:</span><div class="ub-row">';
    LOG.slice(-5).reverse().forEach(function(a){
      h+='<button class="ub-it '+(UCLASS[a.type]||'')+'" onclick="undoAction('+a.seq+')">'+(a.kind==='dg'?'🥂':'🍾')+' '+a.name.split(' ')[0]+' '+PAY_ICON[a.pay]+(a.disc?' '+a.disc:'')+' <b>✕</b></button>';
    });
    h+='</div></div>';
  }
  // Szukanie
  if(NAV.search){
    h+='<div id="searchbar"><input type="text" placeholder="🔍 Szukaj wina..." value="'+SEARCH+'" oninput="SEARCH=this.value;renderKeepFocus()"></div>';
  }
  // Chipsy kategorii
  if(NAV.chips){
    h+='<div id="catchips"><button class="'+(ACTIVE_CAT==='all'?'on':'')+'" onclick="setCat(\'all\')">Wszystkie</button>';
    CATS.forEach(function(c){ h+='<button class="'+(ACTIVE_CAT===c?'on':'')+'" onclick="setCat(\''+c+'\')">'+CAT_ICON[c]+' '+c+'</button>'; });
    h+='</div>';
  }
  // Pasek ulubionych (TOP wg sprzedaży degustacji, min 3)
  if(NAV.fav){
    var fav = WINES.slice().sort(function(a,b){return (b.dg+b.bt)-(a.dg+a.bt);}).slice(0,4);
    h+='<div id="favbar"><div class="fav-title">⭐ Najczęściej sprzedawane</div><div class="fav-row">';
    fav.forEach(function(w){
      h+='<div class="fav-it"><div class="fn">'+w.name+'</div><div class="fb"><span onclick="event.stopPropagation();sell(\''+w.id+'\',\'dg\')">+🥂</span><span onclick="event.stopPropagation();sell(\''+w.id+'\',\'bt\')">+🍾</span></div></div>';
    });
    h+='</div></div>';
  }

  var list = filtered();

  if(MODEL==='grid'){
    h+='<div class="hint">Dotknij wino → wybierz 🥂 degustacja lub 🍾 butelka</div>';
    h+='<div class="grid">';
    list.forEach(function(w){
      h+='<div class="tile '+(TCLASS[w.type]||'')+'" id="tile-'+w.id+'" onclick="openPick(\''+w.id+'\')">'
        +'<div class="tn">'+w.name+'</div>'
        +'<div class="tcounts"><span>🥂 '+w.dg+'</span><span>🍾 '+w.bt+'</span></div>'
        +'<div class="ts">zostało '+w.stock+' but.</div></div>';
    });
    h+='</div>';
    document.getElementById('cnt').innerHTML=h;
    return;
  }

  if(MODEL==='sheet'){
    h+='<div class="hint">Dotknij wino → panel sprzedaży wysunie się z dołu</div>';
    h+='<div class="list-simple">';
    list.forEach(function(w){
      h+='<div class="ls-it" onclick="openSheet(\''+w.id+'\')"><div><div class="lsn">'+w.name+'</div><div class="lss">🥂 '+w.dg+' · 🍾 '+w.bt+'</div></div><div style="text-align:right"><div style="font-size:18px;font-weight:700">'+w.stock+'</div><div style="font-size:9px;color:var(--muted)">but.</div></div></div>';
    });
    h+='</div>';
    document.getElementById('cnt').innerHTML=h;
    return;
  }

  // MODEL LIST — szybka sprzedaż z przyciskami na wierszu
  h+='<div class="hint">+🥂 / +🍾 = sprzedaż od razu · dotknij nazwę = szczegóły</div>';
  if(NAV.chips || SEARCH){
    // płaska lista (filtr aktywny) — bez sekcji
    list.forEach(function(w){ h+=rowHtml(w); });
  } else {
    CATS.forEach(function(c){
      var ws = list.filter(function(w){return w.type===c;});
      if(!ws.length) return;
      var open = SEC_OPEN[c];
      h+='<div class="sec"><div class="sec-h" onclick="toggleSec(\''+c+'\')"><span class="st">'+CAT_ICON[c]+' '+c+' ('+ws.length+')</span><span class="sa">'+(open?'▼':'▶')+'</span></div>';
      if(open){ h+='<div class="sec-body">'; ws.forEach(function(w){ h+=rowHtml(w); }); h+='</div>'; }
      h+='</div>';
    });
  }
  document.getElementById('cnt').innerHTML=h;
}

function rowHtml(w){
  var open = !!w._open;
  var h='<div class="row">';
  h+='<div class="row-top" onclick="toggleRow(\''+w.id+'\')">'
    +'<div class="row-name"><div class="rn">'+w.name+'</div><div class="rs">🥂 '+w.dg+'  🍾 '+w.bt+'  · '+w.dgPrice+'/'+w.btPrice+' zł</div></div>'
    +'<div class="row-stock"><div class="rv">'+w.stock+'</div><div class="rl">but.</div></div>'
    +'<span style="color:var(--muted);opacity:.5">'+(open?'▼':'▶')+'</span></div>';
  h+='<div class="row-quick">'
    +'<button class="qbtn qdg" onclick="sell(\''+w.id+'\',\'dg\')">+ 🥂 Degustacja</button>'
    +'<button class="qbtn qbt" onclick="sell(\''+w.id+'\',\'bt\')">+ 🍾 Butelka</button></div>';
  if(open){
    h+='<div class="row-detail">Cena degustacji: <b>'+w.dgPrice+' zł</b> · butelka: <b>'+w.btPrice+' zł</b><br>Stan: <b>'+w.stock+'</b> butelek · sprzedano dziś: 🥂'+w.dg+' / 🍾'+w.bt+'<br><span style="color:var(--gold)">Tu byłyby: rabat, ×N, historia butelek, kieliszki…</span></div>';
  }
  h+='</div>';
  return h;
}
function toggleRow(id){ var w=WINES.find(function(x){return x.id===id;}); w._open=!w._open; render(); }

function renderKeepFocus(){
  render();
  var inp=document.querySelector('#searchbar input');
  if(inp){ inp.focus(); inp.setSelectionRange(inp.value.length,inp.value.length); }
}

// ── Model B: bottom sheet ──
function openSheet(id){
  var w=WINES.find(function(x){return x.id===id;});
  buzz(8);
  var h='<div class="sheet-name">'+w.name+'</div><div class="sheet-sub">'+w.stock+' butelek w zapasie · sprzedano 🥂'+w.dg+' / 🍾'+w.bt+'</div>';
  h+='<div class="sheet-ag"><div class="sheet-lbl">🥂 Degustacja — '+w.dgPrice+' zł</div><div class="sheet-row"><button class="minus" onclick="sheetSell(\''+id+'\',\'dg\',-1)">−</button><button class="plus" onclick="sheetSell(\''+id+'\',\'dg\',1)">+ Degustacja</button></div></div>';
  h+='<div class="sheet-ag"><div class="sheet-lbl">🍾 Butelka — '+w.btPrice+' zł</div><div class="sheet-row"><button class="minus" onclick="sheetSell(\''+id+'\',\'bt\',-1)">−</button><button class="plus" onclick="sheetSell(\''+id+'\',\'bt\',1)">+ Butelka</button></div></div>';
  h+='<button class="sheet-close" onclick="closeSheet()">Zamknij</button>';
  document.getElementById('sheet-c').innerHTML=h;
  document.getElementById('sheet').classList.add('show');
}
function closeSheet(){ document.getElementById('sheet').classList.remove('show'); }

// ── Popup 2-krokowy: wino → rodzaj → płatność + rabat ──
function wColor(t){ return t==='czerwone'?'#e8808e':t==='białe'?'#e0c878':'#ec92bd'; }
function openPick(id){ PICK={id:id, kind:null, pay:PAY, discType:null, discVal:0, screen:null, customUnit:'%'}; buzz(8); renderPick(); document.getElementById('pick').classList.add('show'); }
function closePick(){ document.getElementById('pick').classList.remove('show'); PICK=null; }
function pickType(k){ PICK.kind=k; if(k!=='bt'){ PICK.discType=null; PICK.discVal=0; } buzz(8); renderPick(); }
function pickBack(){ PICK.kind=null; renderPick(); }
function pickPay(p){ PICK.pay=p; buzz(8); renderPick(); }
function pickDisc(t,v){ PICK.discType=t; PICK.discVal=v; buzz(8); renderPick(); }
function pickCustomOpen(){ PICK.screen='custom'; PICK.customUnit=PICK.customUnit||'%'; buzz(8); renderPick(); }
function setCustomUnit(u){ PICK.customUnit=u; if(PICK.discVal>0){ PICK.discType=u; } buzz(8); renderPick(); }
function applyCustom(){ if(!(PICK.discVal>0)){ PICK.discType=null; PICK.discVal=0; } PICK.screen=null; buzz(8); renderPick(); }
function cancelCustom(){ PICK.discType=null; PICK.discVal=0; PICK.screen=null; buzz(8); renderPick(); }
function customInput(v){
  var n=parseFloat((''+v).replace(',','.'));
  if(isNaN(n)||n<=0){ PICK.discType=null; PICK.discVal=0; }
  else { PICK.discType=PICK.customUnit; PICK.discVal=n; }
  // Aktualizacja na żywo bez pełnego re-renderu (żeby nie tracić kursora w polu)
  var w=WINES.find(function(x){return x.id===PICK.id;});
  var base=w.btPrice;
  var fin=Math.max(0,base-discAmount(base));
  var fe=document.getElementById('pick-fin'); if(fe) fe.textContent=fin+' zł';
  var le=document.getElementById('pick-dlabel'); if(le) le.textContent=discLabel()?'('+discLabel()+')':'';
}
function discAmount(base){ if(PICK.kind!=='bt') return 0; if(PICK.discType==='%') return base*PICK.discVal/100; if(PICK.discType==='zł') return Math.min(base,PICK.discVal); return 0; }
function discLabel(){ if(PICK.discType==='%') return '−'+PICK.discVal+'%'; if(PICK.discType==='zł') return '−'+PICK.discVal+' zł'; return null; }
function renderPick(){
  var w=WINES.find(function(x){return x.id===PICK.id;});
  var h='<div class="pick-name" style="color:'+wColor(w.type)+'">'+w.name+'</div>';

  // ── OSOBNY EKRAN: własny rabat (% lub zł) ──
  if(PICK.screen==='custom'){
    var cb=w.btPrice, cfin=Math.max(0,cb-discAmount(cb));
    h+='<div class="pick-sub">Rabat dla 🍾 butelki · cena '+cb+' zł</div>';
    h+='<div class="pick-lbl">Typ rabatu</div><div class="pick-seg">';
    h+='<button class="'+(PICK.customUnit==='%'?'on':'')+'" onclick="setCustomUnit(\'%\')">% procent</button>';
    h+='<button class="'+(PICK.customUnit==='zł'?'on':'')+'" onclick="setCustomUnit(\'zł\')">zł złotówki</button>';
    h+='</div>';
    h+='<div class="pick-lbl">Ile '+(PICK.customUnit==='%'?'procent':'złotych')+'?</div>';
    h+='<input id="custom-input" type="number" inputmode="decimal" class="custom-big" placeholder="np. '+(PICK.customUnit==='%'?'15':'8')+'" value="'+(PICK.discVal>0?PICK.discVal:'')+'" oninput="customInput(this.value)">';
    h+='<div class="pick-total">'+cb+' zł → <b id="pick-fin">'+cfin+' zł</b> <span id="pick-dlabel" style="color:var(--green);font-size:12px">'+(discLabel()?'('+discLabel()+')':'')+'</span></div>';
    h+='<button class="pick-btn pick-confirm" onclick="applyCustom()">✓ Zastosuj rabat</button>';
    h+='<button class="pick-back" onclick="cancelCustom()">← Wróć bez rabatu</button>';
    document.getElementById('pick-c').innerHTML=h;
    var ci=document.getElementById('custom-input'); if(ci) ci.focus();
    return;
  }

  // ── KROK 1: rodzaj ──
  if(!PICK.kind){
    h+='<div class="pick-sub">'+w.stock+' but. w zapasie · wybierz rodzaj</div>';
    h+='<button class="pick-btn pick-dg" onclick="pickType(\'dg\')">🥂 Degustacja — '+w.dgPrice+' zł</button>';
    h+='<button class="pick-btn pick-bt" onclick="pickType(\'bt\')">🍾 Butelka — '+w.btPrice+' zł</button>';
    h+='<button class="pick-cancel" onclick="closePick()">Anuluj</button>';
    document.getElementById('pick-c').innerHTML=h;
    return;
  }

  // ── KROK 2: płatność (+ rabat dla butelki) ──
  var base=PICK.kind==='dg'?w.dgPrice:w.btPrice;
  var da=discAmount(base), fin=Math.max(0,base-da);
  h+='<div class="pick-sub">'+(PICK.kind==='dg'?'🥂 Degustacja':'🍾 Butelka')+' · cena '+base+' zł</div>';
  h+='<div class="pick-lbl">1. Płatność</div><div class="pick-seg">';
  [['gotówka','💵','#2e7d4f'],['karta','💳','#2f6fb0'],['blik','📱','#7a3fb0']].forEach(function(p){
    var on=PICK.pay===p[0];
    h+='<button onclick="pickPay(\''+p[0]+'\')" style="'+(on?'background:'+p[2]+';color:#fff;border-color:'+p[2]:'')+'">'+p[1]+' '+p[0]+'</button>';
  });
  h+='</div>';
  if(PICK.kind==='bt'){
    var customActive = !!PICK.discType && !(PICK.discType==='%'&&(PICK.discVal===5||PICK.discVal===10));
    h+='<div class="pick-lbl">2. Rabat (tylko butelka)</div><div class="pick-seg pick-disc">';
    [['Brak',null,0],['−5%','%',5],['−10%','%',10]].forEach(function(o){
      var on=(o[1]===null&&PICK.discType===null)||(PICK.discType===o[1]&&PICK.discVal===o[2]);
      h+='<button class="'+(on?'on':'')+'" onclick="pickDisc('+(o[1]===null?'null':'\''+o[1]+'\'')+','+o[2]+')">'+o[0]+'</button>';
    });
    h+='<button class="'+(customActive?'on':'')+'" onclick="pickCustomOpen()">'+(customActive?'Inny '+discLabel():'Inny…')+'</button>';
    h+='</div>';
  }
  h+='<div class="pick-total">Do zapłaty: <b>'+fin+' zł</b>'+(da>0?' <span style="color:var(--green);font-size:12px">('+discLabel()+')</span>':'')+'</div>';
  h+='<button class="pick-btn pick-confirm" onclick="confirmPick()">✓ Sprzedaj '+fin+' zł '+PAY_ICON[PICK.pay]+'</button>';
  h+='<button class="pick-back" onclick="pickBack()">← Wróć do wyboru rodzaju</button>';
  document.getElementById('pick-c').innerHTML=h;
}
function confirmPick(){
  var w=WINES.find(function(x){return x.id===PICK.id;});
  var base=PICK.kind==='dg'?w.dgPrice:w.btPrice;
  var da=discAmount(base), id=PICK.id, kind=PICK.kind, pay=PICK.pay, dl=discLabel();
  closePick();
  sell(id,kind,{pay:pay, discAmt:da, discLabel:dl});
  var el=document.getElementById('tile-'+id);
  if(el){ el.classList.add('flash'); setTimeout(function(){el.classList.remove('flash');},400); }
}
function sheetSell(id,kind,dir){
  var w=WINES.find(function(x){return x.id===id;});
  if(dir>0){ sell(id,kind); }
  else { // korekta
    if(kind==='dg'&&w.dg>0){ w.dg--; SOLD.dg--; SOLD.rev-=w.dgPrice; }
    else if(kind==='bt'&&w.bt>0){ w.bt--; w.stock++; SOLD.bt--; SOLD.rev-=w.btPrice; }
    buzz(10); updCounter();
  }
  openSheet(id); // odśwież panel
}

// ── Model C: kafelki — tap=dg, long-press=bt ──
function bindTiles(){
  document.querySelectorAll('.tile').forEach(function(t){
    var id=t.dataset.id, timer=null, longed=false;
    function start(e){ longed=false; timer=setTimeout(function(){ longed=true; buzz([20,30,20]); sell(id,'bt'); var el=document.getElementById('tile-'+id); if(el){el.classList.add('flash');setTimeout(function(){el.classList.remove('flash');},400);} }, 480); }
    function end(e){ if(timer)clearTimeout(timer); if(!longed){ sell(id,'dg'); var el=document.getElementById('tile-'+id); if(el){el.classList.add('flash');setTimeout(function(){el.classList.remove('flash');},400);} } }
    function cancel(){ if(timer)clearTimeout(timer); longed=true; }
    t.addEventListener('touchstart',start,{passive:true});
    t.addEventListener('touchend',end);
    t.addEventListener('touchmove',cancel,{passive:true});
    // fallback desktop
    t.addEventListener('mousedown',start); t.addEventListener('mouseup',end); t.addEventListener('mouseleave',cancel);
  });
}

render();
updCounter();
</script>
</body>
</html>
