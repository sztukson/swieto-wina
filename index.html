  var bills = DENOMS.filter(function(d){ return d.bill; });
  var coins = DENOMS.filter(function(d){ return !d.bill; });

  var h = '<div class="cash-sec fade">';
  h += '<div class="cash-card">';
  h += '<div class="cc-title">💰 Kasa — stan oczekiwany</div>';
  h += '<div class="cc-amt">' + fmtN(ec) + ' zł</div>';
  h += '<div class="cc-sub">Otwarcie: ' + fmtN(cashInitial()) + ' zł · Utarg ze sprzedaży: +' + fmtN(totalRev()) + ' zł</div>';
  h += '<div style="font-size:11px;color:var(--muted);margin-top:3px">Kaucje (' + fmt(depBal()) + ' salda) liczone osobno — rozliczane przy zwrocie kieliszków</div>';
  h += '<div style="display:flex;gap:8px;margin-top:10px">';
  h += '<div style="flex:1;background:var(--bg);border-radius:var(--rsm);padding:8px 10px"><div style="font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase">Policzono</div><div style="font-size:16px;font-weight:700">' + (cc>0?fmtN(cc)+' zł':'—') + '</div></div>';
  h += '<div style="flex:1;background:var(--bg);border-radius:var(--rsm);padding:8px 10px"><div style="font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase">Różnica</div><div id="cc-diff" style="font-size:16px;font-weight:700;color:var(--muted)">' + (cc>0?(diff>=0?'+':'')+fmtN(diff)+' zł':'—') + '</div></div>';
  h += '<div style="flex:1;background:var(--bg);border-radius:var(--rsm);padding:8px 10px"><div style="font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase">Kaucje</div><div style="font-size:16px;font-weight:700;color:#5b9bd5">+' + fmtN(depBal()) + ' zł</div></div>';
  h += '</div>';
  h += '</div>';

  // Denomination counter
  h += '<div style="font-family:Georgia,serif;font-size:15px;color:var(--gold)">Przelicz gotówkę</div>';
  h += buildDenomTable(bills, 'Banknoty');
  h += buildDenomTable(coins, 'Monety');
  h += '<div style="background:var(--s2);border-radius:var(--r);padding:12px 14px;display:flex;justify-content:space-between;align-items:center">';
  h += '<span style="font-size:12px;color:var(--muted)">Suma policzonych</span>';
  h += '<span id="cc-total" style="font-size:20px;font-weight:700;color:var(--gold)">' + fmt(cc) + '</span>';
  h += '</div>';

  // Torby
  var bags = S.bags || {sold:0, rev:0};
  h += '<div style="font-family:Georgia,serif;font-size:15px;color:var(--gold)">🛍️ Torby materiałowe</div>';
  h += '<div style="background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;justify-content:space-between">';
  h += '<div><span style="font-size:22px;font-weight:800;color:var(--text)">' + bags.sold + '</span><span style="font-size:12px;color:var(--muted);margin-left:6px">sprzedanych · ' + fmtN(bags.rev) + ' zł</span></div>';
  h += '<div style="display:flex;gap:6px">';
  h += '<button onclick="undoBag()" style="background:var(--s3);border:1px solid var(--border);color:var(--muted);border-radius:var(--rsm);padding:8px 12px;font-size:16px;cursor:pointer">−</button>';
  h += '<button onclick="sellBag()" style="background:var(--wine);border:none;color:#fff;border-radius:var(--rsm);padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer">+ Torba 6 zł</button>';
  h += '</div></div>';

  // Manko
  h += '<div style="font-family:Georgia,serif;font-size:15px;color:var(--gold)">📊 Manko / Nadwyżka</div>';
  var expC = expectedCash();
  h += '<div style="background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px">';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">';
  h += '<div><div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase">Oczekiwana</div><div style="font-size:18px;font-weight:700;color:var(--gold)">' + fmtN(expC) + ' zł</div></div>';
  h += '<div><div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase">Policzona</div><div style="font-size:18px;font-weight:700;color:var(--text)">' + (cc > 0 ? fmtN(cc) + ' zł' : '—') + '</div></div>';
  h += '<div><div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase">Różnica</div>';
  if (cc > 0) {
    var manko = cc - expC;
    var mankoColor = manko >= 0 ? 'var(--green)' : 'var(--red)';
    var mankoLabel = manko >= 0 ? '✅ Nadwyżka' : '⚠️ Manko';
    h += '<div style="font-size:18px;font-weight:700;color:' + mankoColor + '">' + (manko >= 0 ? '+' : '') + fmtN(manko) + ' zł</div>';
    h += '<div style="font-size:10px;color:' + mankoColor + '">' + mankoLabel + '</div>';
  } else {
    h += '<div style="font-size:14px;color:var(--muted)">przelicz gotówkę</div>';
  }
  h += '</div></div></div>';

  // Kasa startowa — edycja
  h += '<div style="font-family:Georgia,serif;font-size:15px;color:var(--gold)">💵 Kasa startowa</div>';
  h += '<div style="background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;justify-content:space-between">';
  h += '<div><div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase">Saldo otwarcia</div><div style="font-size:22px;font-weight:700;color:var(--gold)">' + fmtN(cashInitial()) + ' zł</div></div>';
  h += '<button onclick="openSetInitialCash()" style="background:var(--s3);border:1px solid var(--border);color:var(--text);border-radius:var(--rsm);padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer">✏️ Zmień</button>';
  h += '</div>';

  // Cash operation form
  h += '<div style="font-family:Georgia,serif;font-size:15px;color:var(--gold)">Operacja kasowa</div>';
  h += '<div class="op-form">';
  h += '<div><div class="fl">Rodzaj</div><div class="op-btns"><div class="op-btn on-in" data-t="wpłata" onclick="setOpType(\'wpłata\')">⬆️ Wpłata</div><div class="op-btn" data-t="wypłata" onclick="setOpType(\'wypłata\')">⬇️ Wypłata</div></div></div>';
  h += '<div><div class="fl">Kwota (zł)</div><input class="fi" id="op-amt" type="number" step="0.01" placeholder="0,00"></div>';
  h += '<div><div class="fl">Osoba</div><input class="fi" id="op-who" type="text" placeholder="np. Tata, Mery..."></div>';
  h += '<div><div class="fl">Opis</div><input class="fi" id="op-desc" type="text" placeholder="np. zabranie utargu, jedzenie..."></div>';
  h += '<button class="btn-p" onclick="submitOp()">Dodaj operację</button>';
  h += '</div>';

  // Recent ops
  var ops = S.cash.ops.slice().reverse().slice(0,8);
  h += '<div style="font-family:Georgia,serif;font-size:15px;color:var(--gold)">Ostatnie operacje</div>';
  h += '<div class="dep-box">';
  if (ops.length === 0) {
    h += '<div style="padding:14px;text-align:center;color:var(--muted);font-size:12px">Brak operacji</div>';
  } else {
    ops.forEach(function(op){
      h += '<div class="dep-row"><div><div style="font-size:13px;font-weight:600">' + (op.type==='wpłata'?'⬆️':'⬇️') + ' ' + esc(op.desc) + '</div><div style="font-size:11px;color:var(--muted)">' + fmtTime(op.ts) + '</div></div><div style="font-size:15px;font-weight:700;color:' + (op.type==='wpłata'?'var(--green)':'var(--red)') + '">' + (op.type==='wpłata'?'+':'−') + fmt(op.amt) + '</div></div>';
    });
  }
  h += '</div>';
  h += '</div>';

  document.getElementById('cnt').innerHTML = h;
  setOpType(OP_T);
}

function buildDenomTable(list, title) {
  var h = '<div style="background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden">';
  h += '<div style="padding:8px 14px;background:var(--s2);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gold);border-bottom:1px solid var(--border)">' + title + '</div>';
  list.forEach(function(d){
    var cnt = S.cash.dn[d.k]||0;
    var tot = cnt * d.v;
    h += '<div style="display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);gap:10px">';
    h += '<span style="font-size:13px;font-weight:600;min-width:58px">' + d.l + '</span>';
    h += '<input style="background:var(--s3);border:1px solid var(--dim);border-radius:var(--rsm);color:var(--text);font-size:17px;font-weight:700;text-align:center;width:66px;height:38px;padding:0" type="number" min="0" value="' + (cnt||'') + '" placeholder="0" oninput="updDenom(\'' + d.k + '\',this.value)">';
    h += '<span id="dr-' + d.k + '" style="margin-left:auto;font-size:12px;color:' + (tot>0?'var(--text)':'var(--muted)') + ';min-width:64px;text-align:right;font-weight:' + (tot>0?'600':'normal') + '">' + (tot>0?fmt(tot):'—') + '</span>';
    h += '</div>';
  });
  h += '</div>';
  return h;
}

// ─────────────────────────────────────────────
// RENDER STATS
// ─────────────────────────────────────────────
function renderStats() {
  var h = '<div class="st-sec fade">';

  // Summary row
  var rev = totalRev(), dg = totalDg(), bt = totalBt();
  var clients = dg + bt;
  var totalClosedAll = S.wines.reduce(function(s,w){ return s + w.closedBottles.length; }, 0);
  var openBottles = S.wines.filter(function(w){ return (w.dg - w.dgAtLastClose) > 0; }).length;
  h += '<div class="db-grid">';
  h += '<div class="db-card"><div class="db-label">Klientów est.</div><div class="db-val">' + clients + '</div></div>';
  h += '<div class="db-card"><div class="db-label">Przychód</div><div class="db-val" style="color:var(--gold);font-size:20px">' + fmtN(rev) + ' zł</div></div>';
  h += '</div>';

  // ── Płatności + Rabaty ──
  var payMap2 = {GOT:{rev:0,cnt:0}, KAR:{rev:0,cnt:0}, BLI:{rev:0,cnt:0}};
  var discTotal2 = 0, discCnt2 = 0, discItems2 = [];
  (S.log||[]).forEach(function(e){
    var isSale = e.type==='degustacja'||e.type==='butelka'||e.type==='torba';
    if (isSale && e.amt > 0 && e.pay && payMap2[e.pay]) {
      payMap2[e.pay].rev += e.amt; payMap2[e.pay].cnt++;
    }
    if (e.discount && e.discount > 0) { discTotal2 += e.discount; discCnt2++; discItems2.push(e); }
  });
  var payTotal2 = payMap2.GOT.rev + payMap2.KAR.rev + payMap2.BLI.rev;
  var payHasData = payMap2.GOT.cnt + payMap2.KAR.cnt + payMap2.BLI.cnt > 0;
  if (payHasData) {
    h += '<div class="st-card">';
    h += '<div class="st-title">💳 Metody płatności</div>';
    var payDefs = [{k:'GOT',ico:'💵',name:'Gotówka'},{k:'KAR',ico:'💳',name:'Karta'},{k:'BLI',ico:'📱',name:'BLIK'}];
    payDefs.forEach(function(pd){
      var pm = payMap2[pd.k];
      if (pm.cnt === 0) return;
      var pct = payTotal2 > 0 ? Math.round(pm.rev/payTotal2*100) : 0;
      h += '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05)">';
      h += '<span style="font-size:16px">' + pd.ico + '</span>';
      h += '<div style="flex:1"><div style="font-size:12px;font-weight:700;color:var(--text)">' + pd.name + '</div>';
      h += '<div style="background:var(--s3);border-radius:4px;height:5px;margin-top:4px"><div style="width:' + pct + '%;background:var(--gold);border-radius:4px;height:5px"></div></div></div>';
      h += '<div style="text-align:right;flex-shrink:0"><div style="font-size:13px;font-weight:700;color:var(--gold)">' + fmtN(pm.rev) + ' zł</div>';
      h += '<div style="font-size:10px;color:var(--muted)">' + pm.cnt + ' trans. · ' + pct + '%</div></div>';
      h += '</div>';
    });
    h += '</div>';
  }
  // discCardHtml — wstawiany przed "Kończące się wina"
  var discCardHtml = '';
  if (discCnt2 > 0) {
    var discPct2 = rev > 0 ? (discTotal2/(rev+discTotal2)*100).toFixed(1) : '0';
    var discByType = {};
    discItems2.forEach(function(e){
      var iPct = (e.amt + e.discount) > 0 ? Math.round(e.discount/(e.amt+e.discount)*100) : 0;
      var typeName = e.type === 'degustacja' ? 'Degustacja' : ('Butelka' + (e.wine ? ' — ' + e.wine : ''));
      var k = typeName + '|' + fmtN(e.discount) + '|' + iPct;
      discByType[k] = (discByType[k]||0) + 1;
    });
    discCardHtml += '<div class="st-card">';
    discCardHtml += '<div class="st-title">📉 Rabaty</div>';
    discCardHtml += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px">';
    discCardHtml += '<div style="background:var(--s2);border-radius:8px;padding:8px;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--orange)">' + discCnt2 + '</div><div style="font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px">razy</div></div>';
    discCardHtml += '<div style="background:var(--s2);border-radius:8px;padding:8px;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--orange)">−' + fmtN(discTotal2) + ' zł</div><div style="font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px">łącznie</div></div>';
    discCardHtml += '<div style="background:var(--s2);border-radius:8px;padding:8px;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--orange)">−' + discPct2 + '%</div><div style="font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px">pełnej ceny</div></div>';
    discCardHtml += '</div>';
    discCardHtml += '<div style="font-size:10px;color:var(--muted);margin-bottom:6px">% liczony od kwoty przed rabatem (tj. ile oddaliśmy z pełnej ceny)</div>';
    Object.keys(discByType).forEach(function(k){
      var parts = k.split('|');
      discCardHtml += '<div style="display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:4px 0;border-top:1px solid rgba(255,255,255,.05)">';
      discCardHtml += '<span style="color:var(--muted);flex:1;margin-right:6px">' + parts[0] + '</span>';
      discCardHtml += '<span style="color:var(--orange);font-weight:700;white-space:nowrap">−' + parts[1] + ' zł <span style="opacity:.7">(' + parts[2] + '%)</span></span>';
      discCardHtml += '<span style="color:var(--text);font-weight:700;min-width:28px;text-align:right">×' + discByType[k] + '</span></div>';
    });
    discCardHtml += '<div style="font-size:10px;color:var(--muted);margin-top:8px;padding-top:6px;border-top:1px solid rgba(255,255,255,.05)">Bez rabatów utarg wyniósłby: <strong style="color:var(--text)">' + fmtN(rev+discTotal2) + ' zł</strong></div>';
    discCardHtml += '</div>';
  }

  // Butelki: sprzedane vs rozlane
  h += '<div class="st-card">';
  h += '<div class="st-title">🍾 Butelki — sprzedane vs rozlane</div>';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">';
  h += '<div style="background:rgba(200,168,75,.08);border:1px solid rgba(200,168,75,.2);border-radius:8px;padding:10px;text-align:center">';
  h += '<div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px">Sprzedane całe</div>';
  h += '<div style="font-size:28px;font-weight:900;color:var(--gold);margin:2px 0">' + bt + '</div>';
  h += '<div style="font-size:11px;color:var(--muted)">butelek · ' + fmtN(bt * (S.wines[0] ? S.wines[0].pb : 0)) + ' zł</div>';
  h += '</div>';
  h += '<div style="background:rgba(230,126,34,.08);border:1px solid rgba(230,126,34,.2);border-radius:8px;padding:10px;text-align:center">';
  h += '<div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px">Rozlane kieliszkami</div>';
  h += '<div style="font-size:28px;font-weight:900;color:var(--orange);margin:2px 0">' + totalClosedAll + '</div>';
  h += '<div style="font-size:11px;color:var(--muted)">zamkn. + ' + openBottles + ' otwart. · ' + dg + ' kiel.</div>';
  h += '</div>';
  h += '</div>';
  // Per wino: ile butelek poszło na degustację
  var winesWithDg = S.wines.filter(function(w){ return w.dg > 0 || w.closedBottles.length > 0; });
  if (winesWithDg.length > 0) {
    h += '<div style="margin-top:8px">';
    winesWithDg.forEach(function(w){
      var closed = w.closedBottles.length;
      var inProg = (w.dg - w.dgAtLastClose) > 0 ? 1 : 0;
      var dots = '';
      for (var i=0;i<closed;i++) dots += '<span style="color:var(--green);font-size:14px" title="zamknięta">●</span>';
      if (inProg) dots += '<span style="color:var(--orange);font-size:14px" title="w toku">◑</span>';
      var shortN = w.name.length > 22 ? w.name.slice(0,20)+'…' : w.name;
      h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px">';
      h += '<span style="color:var(--muted)">' + esc(shortN) + '</span>';
      h += '<span style="display:flex;align-items:center;gap:3px">' + dots + '</span>';
      h += '<span style="color:var(--text);min-width:60px;text-align:right">' + w.dg + ' kiel. / ' + (closed + inProg) + ' but.</span>';
      h += '</div>';
    });
    h += '</div>';
  }
  h += '</div>';

  // Top wines by revenue
  var byRev = S.wines.slice().sort(function(a,b){ return b.rev - a.rev; });
  var maxRev = Math.max.apply(null, byRev.map(function(w){ return w.rev; })) || 1;
  var typeC = {białe:'var(--gold)', różowe:'#d4558a', czerwone:'var(--wine2)'};

  h += '<div class="st-card">';
  h += '<div class="st-title">💰 Przychód wg wina</div>';
  h += '<div class="bar-chart">';
  byRev.forEach(function(w){
    if (w.rev === 0) return;
    var pct = (w.rev / maxRev * 100).toFixed(1);
    var shortName = w.name.length > 20 ? w.name.slice(0,18)+'…' : w.name;
    h += '<div class="bar-row">';
    h += '<span class="bar-name">' + esc(shortName) + '</span>';
    h += '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + (typeC[w.type]||'var(--wine)') + '"></div></div>';
    h += '<span class="bar-val" style="color:var(--gold)">' + fmtN(w.rev) + ' zł</span>';
    h += '</div>';
  });
  if (byRev.every(function(w){ return w.rev===0; })) {
    h += '<div style="color:var(--muted);font-size:12px;text-align:center;padding:8px">Brak danych</div>';
  }
  h += '</div></div>';

  // Wszystkie wina — degustacje
  var byDg = S.wines.slice().sort(function(a,b){ return b.dg - a.dg; }).filter(function(w){ return w.dg>0; });
  if (byDg.length > 0) {
    var maxDg = byDg[0].dg || 1;
    h += '<div class="st-card"><div class="st-title">🥂 Degustacje — wszystkie wina</div><div class="bar-chart">';
    byDg.forEach(function(w, i){
      var pct = (w.dg / maxDg * 100).toFixed(1);
      var medal = i < 3 ? ['🥇','🥈','🥉'][i] + ' ' : (i+1) + '. ';
      var shortName = w.name.length > 20 ? w.name.slice(0,18)+'…' : w.name;
      h += '<div class="bar-row">';
      h += '<span class="bar-name">' + medal + esc(shortName) + '</span>';
      h += '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + (typeC[w.type]||'var(--wine)') + '"></div></div>';
      h += '<span class="bar-val">' + w.dg + ' kiel.</span>';
      h += '</div>';
    });
    h += '</div></div>';
  }

  // Wszystkie wina — butelki sprzedane
  var byBt = S.wines.slice().sort(function(a,b){ return b.bt - a.bt; }).filter(function(w){ return w.bt>0; });
  if (byBt.length > 0) {
    var maxBt = byBt[0].bt || 1;
    h += '<div class="st-card"><div class="st-title">🍾 Butelki sprzedane — wszystkie wina</div><div class="bar-chart">';
    byBt.forEach(function(w, i){
      var pct = (w.bt / maxBt * 100).toFixed(1);
      var medal = i < 3 ? ['🥇','🥈','🥉'][i] + ' ' : (i+1) + '. ';
      var shortName = w.name.length > 20 ? w.name.slice(0,18)+'…' : w.name;
      h += '<div class="bar-row">';
      h += '<span class="bar-name">' + medal + esc(shortName) + '</span>';
      h += '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + (typeC[w.type]||'var(--wine)') + '"></div></div>';
      h += '<span class="bar-val">' + w.bt + ' but.</span>';
      h += '</div>';
    });
    h += '</div></div>';
  }

  // Sprzedaż godzinowa + punktacja
  var hourly = {};
  S.log.forEach(function(l){
    if (l.type !== 'degustacja' && l.type !== 'butelka' && l.type !== 'torba' && l.type !== 'korekta') return;
    var hr = new Date(l.ts).getHours();
    if (!hourly[hr]) hourly[hr] = {dg:0, bt:0, bags:0, revDg:0, revBt:0, revBag:0, ptsDg:0, ptsBt:0, ptsBag:0};
    if (l.type === 'degustacja') {
      hourly[hr].dg++;
      hourly[hr].ptsDg += 1;
      hourly[hr].revDg += l.amt || 0;
    } else if (l.type === 'butelka') {
      hourly[hr].bt++;
      var logWine = S.wines.find(function(w){ return w.name===l.wine; });
      hourly[hr].ptsBt += logWine ? winePoints(logWine.pb) : 15;
      hourly[hr].revBt += l.amt || 0;
    } else if (l.type === 'torba') {
      hourly[hr].bags++;
      hourly[hr].ptsBag += 2;
      hourly[hr].revBag += l.amt || 0;
    } else if (l.type === 'korekta') {
      if (l.sub === 'dg') { hourly[hr].dg--; hourly[hr].ptsDg -= 1; hourly[hr].revDg += l.amt || 0; }
      else if (l.sub === 'bt') {
        hourly[hr].bt--;
        var logWine2 = S.wines.find(function(w){ return w.name===l.wine; });
        hourly[hr].ptsBt -= logWine2 ? winePoints(logWine2.pb) : 15;
        hourly[hr].revBt += l.amt || 0;
      } else if (l.sub === 'bag') { hourly[hr].bags--; hourly[hr].ptsBag -= 2; hourly[hr].revBag += l.amt || 0; }
    }
  });
  var hours = Object.keys(hourly).sort(function(a,b){ return a-b; });
  if (hours.length > 0) {
    var maxDgAll  = Math.max.apply(null, hours.map(function(hr){ return hourly[hr].dg; }))   || 1;
    var maxBtAll  = Math.max.apply(null, hours.map(function(hr){ return hourly[hr].bt; }))   || 1;
    var maxBagAll = Math.max.apply(null, hours.map(function(hr){ return hourly[hr].bags; })) || 1;
    // Punkty i zł tylko z aktywnych filtrów
    function dispPtsHr(hr) {
      return (HOURLY_SHOW.dg?hourly[hr].ptsDg:0) + (HOURLY_SHOW.bt?hourly[hr].ptsBt:0) + (HOURLY_SHOW.bag?hourly[hr].ptsBag:0);
    }
    function dispRevHr(hr) {
      return (HOURLY_SHOW.dg?hourly[hr].revDg:0) + (HOURLY_SHOW.bt?hourly[hr].revBt:0) + (HOURLY_SHOW.bag?hourly[hr].revBag:0);
    }
    var maxPts   = Math.max.apply(null, hours.map(function(hr){ return dispPtsHr(hr); })) || 1;
    var totalPts = hours.reduce(function(s,hr){ return s + dispPtsHr(hr); }, 0);

    h += '<div class="st-card">';
    h += '<div class="st-title" style="display:flex;justify-content:space-between">🕐 Sprzedaż godzinowa <span style="color:var(--gold);font-size:12px">⭐ ' + totalPts + ' pkt</span></div>';

    // Filtry — checkboxy
    h += '<div style="display:flex;gap:14px;margin-bottom:10px;padding:8px 10px;background:var(--s2);border-radius:8px">';
    var hFilters = [{k:'dg',l:'🥂 Degustu',col:'#5b9bd5'},{k:'bt',l:'🍾 Butelki',col:'var(--wine)'},{k:'bag',l:'🛍️ Torby',col:'var(--gold)'}];
    hFilters.forEach(function(f){
      var on = HOURLY_SHOW[f.k];
      h += '<label onclick="HOURLY_SHOW.' + f.k + '=!' + on + ';renderTab()" style="display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none">';
      h += '<span style="width:16px;height:16px;border-radius:4px;border:2px solid ' + (on?f.col:'var(--dim)') + ';background:' + (on?f.col:'transparent') + ';display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s">' + (on?'<span style="color:#fff;font-size:11px;font-weight:900;line-height:1">✓</span>':'') + '</span>';
      h += '<span style="font-size:12px;font-weight:600;color:' + (on?'var(--text)':'var(--muted)') + '">' + f.l + '</span>';
      h += '</label>';
    });
    h += '</div>';

    h += '<div style="display:grid;grid-template-columns:38px 1fr 44px 46px;gap:4px;align-items:center;padding:2px 0;font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:4px">';
    h += '<span>Godz.</span><span>Sprzedaż</span><span style="text-align:center">💰 zł</span><span style="text-align:right">⭐ pkt</span></div>';

    hours.forEach(function(hr){
      h += '<div style="display:grid;grid-template-columns:38px 1fr 44px 46px;gap:4px;align-items:center;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)">';
      h += '<span style="font-size:11px;font-weight:700;color:var(--muted)">' + hr + ':00</span>';
      h += '<div style="display:flex;flex-direction:column;gap:2px">';
      if (HOURLY_SHOW.dg) {
        var pDg = (hourly[hr].dg / maxDgAll * 100).toFixed(0);
        h += '<div style="display:flex;gap:2px;align-items:center;font-size:10px;color:var(--muted)"><span style="min-width:22px">🥂' + hourly[hr].dg + '</span><div style="flex:1;height:6px;background:var(--s3);border-radius:3px"><div style="width:' + pDg + '%;height:100%;background:#5b9bd5;border-radius:3px"></div></div></div>';
      }
      if (HOURLY_SHOW.bt) {
        var pBt = (hourly[hr].bt / maxBtAll * 100).toFixed(0);
        h += '<div style="display:flex;gap:2px;align-items:center;font-size:10px;color:var(--muted)"><span style="min-width:22px">🍾' + hourly[hr].bt + '</span><div style="flex:1;height:6px;background:var(--s3);border-radius:3px"><div style="width:' + pBt + '%;height:100%;background:var(--wine);border-radius:3px"></div></div></div>';
      }
      if (HOURLY_SHOW.bag) {
        var pBag = (hourly[hr].bags / maxBagAll * 100).toFixed(0);
        h += '<div style="display:flex;gap:2px;align-items:center;font-size:10px;color:var(--muted)"><span style="min-width:22px">🛍️' + hourly[hr].bags + '</span><div style="flex:1;height:6px;background:var(--s3);border-radius:3px"><div style="width:' + pBag + '%;height:100%;background:var(--gold);border-radius:3px;opacity:.7"></div></div></div>';
      }
      h += '</div>';
      var dRev = dispRevHr(hr), dPts = dispPtsHr(hr);
      h += '<span style="text-align:center;font-size:11px;color:var(--gold);font-weight:700">' + fmtN(dRev) + '</span>';
      h += '<span style="text-align:right;font-size:12px;font-weight:700;color:' + (dPts===maxPts?'var(--gold)':'var(--text)') + '">⭐' + dPts + '</span>';
      h += '</div>';
    });
    h += '</div>';
  }

  // Stock warnings
  h += discCardHtml;
  var low = S.wines.filter(function(w){ return bottlesLeft(w) <= 3; });
  if (low.length > 0) {
    h += '<div class="st-card"><div class="st-title">⚠️ Kończące się wina</div><div class="warn-list">';
    low.forEach(function(w){
      var bl = bottlesLeft(w);
      h += '<div class="warn-item">';
      h += '<span style="font-size:13px;font-weight:600">' + esc(w.name) + '</span>';
      h += '<span style="font-size:13px;font-weight:700;color:' + stockColor(bl) + '">' + bl + ' but.</span>';
      h += '</div>';
    });
    h += '</div></div>';
  }

  // Magazine summary
  var totalML = S.wines.reduce(function(s,w){ return s+w.ml; }, 0);
  var totalBl = S.wines.reduce(function(s,w){ return s+bottlesLeft(w); }, 0);
  var totalClosedAll = S.wines.reduce(function(s,w){ return s+w.closedBottles.length; }, 0);
  h += '<div class="st-card">';
  h += '<div style="display:flex;align-items:center;justify-content:space-between">';
  h += '<div class="st-title" style="margin:0">📦 Magazyn</div>';
  h += '<div style="display:flex;align-items:center;gap:8px">';
  h += '<button onclick="openCartonSettings()" style="background:var(--s3);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 8px;font-size:10px;font-weight:700;cursor:pointer">📦 ' + CARTON_SIZE + ' but./kart.</button>';
  if (MAG_OPEN) h += '<span onclick="MAG_OPEN=false;renderTab()" style="font-size:12px;color:var(--muted);font-weight:400;cursor:pointer">▲ zwiń</span>';
  h += '</div></div>';
  h += '<div class="db-grid" style="margin-top:8px">';
  var lowCount = S.wines.filter(function(w){ return bottlesLeft(w) <= 3; }).length;
  var zeroCount = S.wines.filter(function(w){ return bottlesLeft(w) === 0; }).length;
  var totalBlCol = zeroCount > 0 ? 'var(--red)' : lowCount > 0 ? 'var(--orange)' : 'var(--green)';
  var totalBlNote = zeroCount > 0 ? ' ❌ ' + zeroCount + ' win bez zapasu' : lowCount > 0 ? ' ⚠️ ' + lowCount + ' win mało' : '';
  var totalK = Math.floor(totalBl / CARTON_SIZE);
  var totalR = totalBl % CARTON_SIZE;
  var kartonStr = totalK > 0 ? '<div style="font-size:11px;color:var(--muted);margin-top:1px">' + totalK + ' kart.' + (totalR > 0 ? ' + ' + totalR + ' luz.' : '') + '</div>' : '';
  h += '<div onclick="MAG_OPEN=!MAG_OPEN;renderTab()" style="background:var(--s2);border-radius:var(--rsm);padding:10px;text-align:center;cursor:pointer"><div style="font-size:24px;font-weight:700;color:' + totalBlCol + '">' + totalBl + (!MAG_OPEN ? ' <span style="font-size:13px;color:var(--muted)">▼</span>' : '') + '</div><div style="font-size:10px;color:var(--muted)">Butelek pozostało' + totalBlNote + '</div>' + kartonStr + '</div>';
  h += '<div style="background:var(--s2);border-radius:var(--rsm);padding:10px;text-align:center"><div style="font-size:24px;font-weight:700;color:var(--gold)">' + totalClosedAll + '</div><div style="font-size:10px;color:var(--muted)">Butelek zamkniętych</div></div>';
  h += '</div>';
  if (MAG_OPEN) {
    // filter checkboxes
    var magFilters = [
      {k:'open', l:'🔓 Otwarte', col:'var(--gold)'},
      {k:'closed', l:'🫙 Rozlane', col:'var(--muted)'},
      {k:'sealed', l:'📦 Nieotwarte', col:'var(--green)'},
    ];
    h += '<div onclick="event.stopPropagation()" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;padding:0 2px">';
    magFilters.forEach(function(f) {
      var on = MAG_SHOW[f.k];
      h += '<label onclick="event.stopPropagation();MAG_SHOW.' + f.k + '=!' + (on?'true':'false') + ';renderTab()" style="display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none;padding:5px 10px;background:var(--s2);border-radius:20px;border:1px solid ' + (on?f.col:'var(--dim)') + '">';
      h += '<span style="width:14px;height:14px;border-radius:3px;border:2px solid ' + (on?f.col:'var(--dim)') + ';background:' + (on?f.col:'transparent') + ';display:flex;align-items:center;justify-content:center;flex-shrink:0">' + (on?'<span style="color:#fff;font-size:9px;font-weight:900;line-height:1">✓</span>':'') + '</span>';
      h += '<span style="font-size:11px;font-weight:600;color:' + (on?'var(--text)':'var(--muted)') + '">' + f.l + '</span>';
      h += '</label>';
    });
    h += '</div>';
    h += '<div style="margin-top:8px;display:flex;flex-direction:column;gap:8px">';
    S.wines.forEach(function(w) {
      var bl = bottlesLeft(w);
      var currentTastings = w.dg - w.dgAtLastClose;
      var hasOpenBottle = currentTastings > 0;
      var totalBottles = w.closedBottles.length + (hasOpenBottle ? 1 : 0) + bl;
      h += '<div style="background:var(--s2);border-radius:var(--rsm);overflow:hidden">';
      // wine header
      h += '<div style="padding:9px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)">';
      h += '<div>';
      h += '<div style="font-size:13px;font-weight:700">' + esc(w.name) + '</div>';
      var typeCol = w.type === 'białe' ? 'var(--gold)' : w.type === 'czerwone' ? '#e87080' : '#d4558a';
      h += '<div style="font-size:10px;color:' + typeCol + ';margin-top:1px">' + w.type + '</div>';
      h += '</div>';
      h += '<div style="text-align:right">';
      var blCol = stockColor(bl);
      var blWarn = bl === 0 ? ' ❌' : bl <= 1 ? ' ‼️' : bl <= 3 ? ' ⚠️' : '';
      var wK = Math.floor(bl / CARTON_SIZE), wR = bl % CARTON_SIZE;
      var wKStr = wK > 0 ? wK + 'k' + (wR > 0 ? '+' + wR : '') : '';
      h += '<div style="font-size:18px;font-weight:700;color:' + blCol + '">' + bl + blWarn + ' <span style="font-size:11px;font-weight:400;color:var(--muted)">pełnych' + (wKStr ? ' · ' + wKStr : '') + '</span></div>';
      h += '<div style="font-size:10px;color:var(--muted)">' + w.closedBottles.length + ' rozlane · ' + (hasOpenBottle?'1 otwarta':'brak otwartej') + '</div>';
      h += '</div>';
      h += '</div>';
      // bottles list
      h += '<div style="padding:8px 12px;display:flex;flex-direction:column;gap:5px">';
      // bottle text list
      h += '<div style="display:flex;flex-direction:column;gap:4px">';
      if (MAG_SHOW.sealed && bl > 0) {
        h += '<div style="font-size:13px">🍾 <span style="font-weight:700;color:var(--green)">' + bl + '</span> <span style="color:var(--muted)">' + (bl===1?'butelka nieotwarta':bl<=4?'butelki nieotwarte':'butelek nieotwartych') + '</span></div>';
      }
      if (MAG_SHOW.open && hasOpenBottle) {
        h += '<div style="font-size:13px">🫗 <span style="font-weight:700;color:var(--gold)">1</span> <span style="color:var(--muted)">butelka otwarta</span></div>';
      }
      if (MAG_SHOW.closed && w.closedBottles.length > 0) {
        h += '<div style="font-size:13px">🫙 <span style="font-weight:700;color:var(--muted)">' + w.closedBottles.length + '</span> <span style="color:var(--muted)">' + (w.closedBottles.length===1?'butelka rozlana':w.closedBottles.length<=4?'butelki rozlane':'butelek rozlanych') + '</span></div>';
      }
      var ownQty = (S.log||[]).filter(function(e){ return e.type==='wlasciciel' && e.wine===w.name; }).reduce(function(s,e){ return s+(e.qty||0); }, 0);
      if (ownQty > 0) {
        h += '<div style="font-size:13px">📦 <span style="font-weight:700;color:var(--wine2)">' + ownQty + '</span> <span style="color:var(--muted)">zabrał właściciel</span></div>';
      }
      var hasAnything = (MAG_SHOW.closed && w.closedBottles.length > 0) || (MAG_SHOW.open && hasOpenBottle) || (MAG_SHOW.sealed && bl > 0) || ownQty > 0;
      if (!hasAnything) {
        h += '<div style="font-size:12px;color:var(--muted)">brak dla wybranych filtrów</div>';
      }
      h += '</div>';
      h += '</div></div>';
    });
    h += '</div>';
  }
  h += '</div>';

  h += '</div>';
  document.getElementById('cnt').innerHTML = h;
}

function openCartonSettings() {
  var h = '<div id="cart-m" onclick="if(event.target.id===\'cart-m\')document.getElementById(\'cart-m\').remove()" style="position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)">';
  h += '<div style="background:var(--s1);border:1px solid var(--border);border-radius:16px;width:260px;padding:18px 16px;display:flex;flex-direction:column;gap:12px">';
  h += '<div style="font-family:Georgia,serif;font-size:16px;color:var(--gold)">📦 Rozmiar kartonu</div>';
  h += '<div style="font-size:12px;color:var(--muted)">Ile butelek mieści jeden karton?</div>';
  h += '<div style="display:flex;gap:8px;align-items:center">';
  h += '<button onclick="var e=document.getElementById(\'cart-val\');e.value=Math.max(1,parseInt(e.value||6)-1)" style="background:var(--s3);border:1px solid var(--border);color:var(--text);border-radius:8px;width:44px;height:44px;font-size:20px;cursor:pointer">−</button>';
  h += '<input id="cart-val" class="fi" type="number" min="1" max="100" value="' + CARTON_SIZE + '" style="margin:0;text-align:center;font-size:22px;font-weight:700">';
  h += '<button onclick="var e=document.getElementById(\'cart-val\');e.value=Math.min(100,parseInt(e.value||6)+1)" style="background:var(--s3);border:1px solid var(--border);color:var(--text);border-radius:8px;width:44px;height:44px;font-size:20px;cursor:pointer">+</button>';
  h += '</div>';
  h += '<div style="display:flex;gap:6px;flex-wrap:wrap">';
  [3,6,12,24].forEach(function(n){
    h += '<button onclick="document.getElementById(\'cart-val\').value=' + n + '" style="flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);background:' + (CARTON_SIZE===n?'rgba(200,168,75,.2)':'transparent') + ';color:' + (CARTON_SIZE===n?'var(--gold)':'var(--muted)') + ';font-size:12px;font-weight:700;cursor:pointer">' + n + ' but.</button>';
  });
  h += '</div>';
  h += '<button onclick="CARTON_SIZE=Math.max(1,parseInt(document.getElementById(\'cart-val\').value)||6);document.getElementById(\'cart-m\').remove();renderTab();toast(\'📦 Karton = \'+CARTON_SIZE+\' butelek\')" style="background:var(--wine);color:#fff;border:none;border-radius:10px;padding:11px;font-size:13px;font-weight:700;cursor:pointer">✅ Zapisz</button>';
  h += '<button onclick="document.getElementById(\'cart-m\').remove()" style="background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:9px;font-size:13px;cursor:pointer">Anuluj</button>';
  h += '</div></div>';
  document.body.insertAdjacentHTML('beforeend', h);
}

function openSetInitialCash() {
  var cur = cashInitial();
  var h = '<div id="ic-m" onclick="if(event.target.id===\'ic-m\')document.getElementById(\'ic-m\').remove()" style="position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)">';
  h += '<div style="background:var(--s1);border:1px solid var(--border);border-radius:16px;width:280px;padding:18px 16px;display:flex;flex-direction:column;gap:12px">';
  h += '<div style="font-family:Georgia,serif;font-size:16px;color:var(--gold)">💵 Kasa startowa</div>';
  h += '<div style="font-size:12px;color:var(--muted)">Aktualne saldo otwarcia: <strong style="color:var(--text)">' + fmtN(cur) + ' zł</strong></div>';
  h += '<div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Nowe saldo startowe (zł)</div>';
  h += '<input id="ic-val" class="fi" type="number" min="0" step="0.01" value="' + cur + '" placeholder="np. 300" style="margin:0"></div>';
  h += '<button onclick="confirmSetInitialCash()" style="background:var(--wine);color:#fff;border:none;border-radius:10px;padding:11px;font-size:13px;font-weight:700;cursor:pointer">✅ Ustaw</button>';
  h += '<button onclick="document.getElementById(\'ic-m\').remove()" style="background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:9px;font-size:13px;cursor:pointer">Anuluj</button>';
  h += '</div></div>';
  document.body.insertAdjacentHTML('beforeend', h);
  setTimeout(function(){ var el=document.getElementById('ic-val'); if(el){el.focus();el.select();} }, 80);
}
function confirmSetInitialCash() {
  var v = parseFloat(document.getElementById('ic-val').value);
  if (isNaN(v) || v < 0) { toast('Wpisz poprawną kwotę'); return; }
  S.cash.initial = v;
  document.getElementById('ic-m').remove();
  save(); renderTab();
  toast('💵 Kasa startowa: ' + fmtN(v) + ' zł');
}

function openBottleCorrection() {
  var wineOpts = S.wines.map(function(w){
    var bl = Math.floor(w.ml / 750);
    return '<option value="' + w.id + '">' + w.name + ' (' + bl + ' but. w mag.)</option>';
  }).join('');

function confirmBottleCorrection() {

  var reason = document.getElementById('bc-reason').value || 'korekta';

  });

}

  bBt.style.borderColor = t==='butelka' ? 'var(--wine)' : 'var(--border)';
  bBt.style.background  = t==='butelka' ? 'rgba(139,26,46,.2)' : 'transparent';
  bBt.style.color       = t==='butelka' ? 'var(--wine)' : 'var(--muted)';
  mtxUpdatePreview();
}

function mtxSetPay(pt) {
  document.querySelectorAll('[data-mtxpay]').forEach(function(b){
    var act = b.dataset.mtxpay === pt;
    b.style.borderColor = act ? 'var(--wine)' : 'var(--border)';
    b.style.background  = act ? 'rgba(139,26,46,.2)' : 'transparent';
    b.style.color       = act ? 'var(--wine)' : 'var(--muted)';
  });
}

function mtxQty(d) {
  var el = document.getElementById('mtx-qty');
  var v = Math.max(1, Math.min(20, (parseInt(el.value)||1) + d));
  el.value = v;
  mtxUpdatePreview();
}

function mtxUpdatePreview() {
  var type = (document.getElementById('mtx-type')||{}).value || 'degustacja';
  var qty  = parseInt((document.getElementById('mtx-qty')||{}).value)||1;
  var wid  = (document.getElementById('mtx-wine')||{}).value;
  var w    = wid ? S.wines.find(function(x){ return x.id === wid; }) : null;
  var price = type === 'degustacja' ? 5 : (w ? w.pb : 0);
  var total = price * qty;
  var prev  = document.getElementById('mtx-preview');
  if (prev) prev.innerHTML = '<span style="color:var(--text)">Kwota: <strong style="color:var(--gold);font-size:16px">' + fmtN(total) + ' zł</strong>' + (qty > 1 ? ' (' + qty + ' × ' + price + ' zł)' : '') + '</span>';
}

function confirmManualTx() {
  var date = document.getElementById('mtx-date').value;
  var time = document.getElementById('mtx-time').value;
  var wid  = document.getElementById('mtx-wine').value;
  var type = document.getElementById('mtx-type').value;
  var qty  = Math.max(1, parseInt(document.getElementById('mtx-qty').value)||1);
  var pay  = '';
  document.querySelectorAll('[data-mtxpay]').forEach(function(b){
    if (b.style.color.indexOf('rgb') > -1 && b.dataset.mtxpay) {
      // znajdź aktywny (ma wine color)
    }
  });
  // Znajdź aktywną płatność
  var payBtns = document.querySelectorAll('[data-mtxpay]');
  payBtns.forEach(function(b){
    if (b.style.borderColor === 'var(--wine)' || b.style.borderColor.indexOf('139') > -1 || b.style.background.indexOf('139') > -1) pay = pay || b.dataset.mtxpay;
  });
  if (!pay) pay = 'gotówka';

  var w = S.wines.find(function(x){ return x.id === wid; });
  if (!w) { toast('Wybierz wino'); return; }

  // Timestamp z daty + godziny
  var dt  = new Date(date + 'T' + (time||'12:00') + ':00');
  var tms = dt.getTime();

  var price = type === 'degustacja' ? 5 : w.pb;
  var ml    = type === 'degustacja' ? 50 : 750;
  var amt   = price * qty;

  // Zaktualizuj stan wina
  if (type === 'degustacja') { w.dg += qty; } else { w.bt += qty; }
  w.ml  -= ml * qty;
  if (w.ml < 0) w.ml = 0;
  w.rev += amt;

  // Dodaj do logu
  S.log.unshift({
    id: 'i' + tms + Math.random().toString(36).slice(2,5),
    ts: tms, type: type, wine: w.name,
    qty: qty, amt: amt, pay: pay
  });

  document.getElementById('mtx-m').remove();
  save();
  renderLog();
  toast('✅ Dodano: ' + type + ' ' + w.name + ' ×' + qty + ' — ' + fmtN(amt) + ' zł');
}

function renderLog() {
  var filters = [
    {k:'all', l:'Wszystkie'},
    {k:'degustacja', l:'🥂 Degustu'},
    {k:'butelka', l:'🍾 Butelki'},
    {k:'torba', l:'🛍️ Torby'},
    {k:'korekta', l:'↩️ Korekty'},
    {k:'dostawa', l:'📦 Dostawa'},
    {k:'wydanie', l:'Kieliszki'},
    {k:'wpłata', l:'⬆️ Wpłaty'},
    {k:'wypłata', l:'⬇️ Wypłaty'},
    {k:'usunięte', l:'🗑️ Usunięte'},
  ];
  var PAY_ICONS = {gotówka:'💵', karta:'💳', blik:'📱'};

  var h = '<div class="log-sec fade">';
  h += '<div class="fbar">';
  filters.forEach(function(f){
    h += '<div class="fchip' + (LOG_F===f.k?' on':'') + '" onclick="setLogF(\'' + f.k + '\')">' + f.l + '</div>';
  });
  h += '</div>';

  // Widok usuniętych (z serwera)
  if (LOG_F === 'usunięte') {
    if (DELETED_CACHE === null) {
      h += '<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">⏳ Pobieranie z serwera...</div>';
      document.getElementById('cnt').innerHTML = h + '</div>';
      fetchDeleted();
      return;
    }
    h += '<div style="font-size:11px;color:var(--muted);padding:0 2px">' + DELETED_CACHE.length + ' usuniętych wpisów</div>';
    if (DELETED_CACHE.length === 0) {
      h += '<div style="padding:36px;text-align:center;color:var(--muted)">🗑️ Brak usuniętych wpisów</div>';
    } else {
      DELETED_CACHE.forEach(function(row){
        var l = row.entry;
        var ap = l.amt > 0, an = l.amt < 0;
        var payIcon = l.pay ? (PAY_ICONS[l.pay]||'') + ' ' : '';
        h += '<div class="log-entry" style="opacity:.8;border-color:rgba(231,76,60,.3)">';
        h += '<span class="le-ico">' + (OP_ICONS[l.type]||'📌') + '</span>';
        h += '<div class="le-body">';
        h += '<div class="le-title" style="text-decoration:line-through;color:var(--muted)">' + (OP_LABELS[l.type]||esc(l.type)) + (l.wine?' · '+esc(l.wine):'') + '</div>';
        h += '<div class="le-meta">Orig: ' + fmtTime(l.ts) + ' · Usunięto: ' + row.deleted_at.slice(0,16) + (l.pay?' · '+payIcon+l.pay:'') + '</div>';
        h += '</div>';
        h += '<span class="le-amt ' + (ap?'pos':an?'neg':'neu') + '" style="text-decoration:line-through">' + (l.amt!==0?(ap?'+':'')+fmtN(l.amt)+' zł':'—') + '</span>';
        var entryEsc = esc(JSON.stringify(l));
        h += '<button onclick="restoreLog(\'' + entryEsc + '\')" style="background:rgba(39,174,96,.15);border:1px solid rgba(39,174,96,.4);color:var(--green);font-size:11px;font-weight:700;padding:5px 8px;cursor:pointer;flex-shrink:0;border-radius:6px;margin-left:4px;white-space:nowrap">↩️ Przywróć</button>';
        h += '</div>';
      });
    }
    h += '<button onclick="DELETED_CACHE=null;setLogF(\'usunięte\')" style="margin-top:8px;width:100%;background:var(--s2);border:1px solid var(--border);color:var(--muted);border-radius:var(--rsm);padding:9px;cursor:pointer;font-size:12px">🔄 Odśwież</button>';
    h += '</div>';
    document.getElementById('cnt').innerHTML = h;
    return;
  }

  h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:4px">';
  h += '<button onclick="openManualTx()" style="background:rgba(200,168,75,.08);border:1px dashed rgba(200,168,75,.35);border-radius:var(--r);color:var(--gold);font-size:11px;font-weight:700;padding:10px;cursor:pointer">➕ Dodaj transakcję</button>';
  h += '<button onclick="openBottleCorrection()" style="background:rgba(230,126,34,.08);border:1px dashed rgba(230,126,34,.35);border-radius:var(--r);color:var(--orange);font-size:11px;font-weight:700;padding:10px;cursor:pointer">🫙 Korekta magazynu</button>';
  h += '<button onclick="openOwnerBottles()" style="background:rgba(139,32,50,.08);border:1px dashed rgba(139,32,50,.4);border-radius:var(--r);color:var(--wine2);font-size:11px;font-weight:700;padding:10px;cursor:pointer">📦 Właściciel</button>';
  h += '</div>';

  var filtered = LOG_F === 'all' ? S.log : S.log.filter(function(l){ return l.type === LOG_F; });
  h += '<div style="font-size:11px;color:var(--muted);padding:0 2px">' + filtered.length + ' wpisów</div>';

  if (filtered.length === 0) {
    h += '<div style="padding:36px;text-align:center;color:var(--muted)">📋 Brak wpisów</div>';
  } else {
    filtered.forEach(function(l){
      var ap = l.amt > 0, an = l.amt < 0;
      h += '<div class="log-entry">';
      var payIcon = l.pay ? (PAY_ICONS[l.pay]||'') + ' ' : '';
      h += '<span class="le-ico">' + (OP_ICONS[l.type]||'📌') + '</span>';
      h += '<div class="le-body"><div class="le-title">' + (OP_LABELS[l.type]||esc(l.type)) + (l.wine?' · '+esc(l.wine):'') + '</div>';
      h += '<div class="le-meta">' + fmtTime(l.ts) + (l.qty?' · '+l.qty+' szt.':'') + (l.pay?' · '+payIcon+l.pay:'') + '</div></div>';
      h += '<span class="le-amt ' + (ap?'pos':an?'neg':'neu') + '">' + (l.amt!==0?(ap?'+':'')+fmtN(l.amt)+' zł':'—') + '</span>';
      h += '<button onclick="deleteLog(\'' + l.id + '\')" style="background:none;border:none;color:var(--muted);font-size:16px;padding:4px 6px;cursor:pointer;flex-shrink:0;border-radius:6px;margin-left:2px" title="Usuń wpis">🗑️</button>';
      h += '</div>';
    });
  }
  h += '</div>';
  document.getElementById('cnt').innerHTML = h;
}

function setLogF(f) { LOG_F = f; renderLog(); }

function deleteLog(id) {
  var entry = S.log.find(function(l){ return l.id === id; });
  if (!entry) return;
  var label = (OP_LABELS[entry.type] || entry.type) + (entry.wine ? ' · ' + entry.wine : '');
  var amt = entry.amt !== 0 ? ' · ' + (entry.amt > 0 ? '+' : '') + fmtN(entry.amt) + ' zł' : '';
  var ex2 = document.getElementById('del-log-m');
  if (ex2) ex2.remove();
  var h = '<div id="del-log-m" onclick="if(event.target.id===\'del-log-m\')document.getElementById(\'del-log-m\').remove()" style="position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)">';
  h += '<div style="background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:300px;display:flex;flex-direction:column;gap:12px">';
  h += '<div style="font-size:15px;font-weight:700;color:var(--red)">🗑️ Usuń wpis?</div>';
  h += '<div style="background:var(--s2);border-radius:8px;padding:10px 12px">';
  h += '<div style="font-size:13px;font-weight:600;color:var(--text)">' + esc(label) + amt + '</div>';
  h += '<div style="font-size:11px;color:var(--muted);margin-top:3px">' + fmtTime(entry.ts) + '</div>';
  h += '<div style="font-size:11px;margin-top:6px;color:' + (SB_USER?'var(--green)':'var(--orange)') + '">' + (SB_USER?'✅ Zostanie zsynchronizowany':'⚠️ Tryb offline — nie zostanie zsynchronizowany') + '</div>';
  h += '</div>';
  h += '<div style="display:flex;gap:8px">';
  h += '<button onclick="document.getElementById(\'del-log-m\').remove()" style="flex:1;background:var(--s3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:11px;font-size:13px;font-weight:600;cursor:pointer">Anuluj</button>';
  h += '<button onclick="confirmDeleteLog(\'' + id + '\')" style="flex:1;background:var(--red);border:none;color:#fff;border-radius:8px;padding:11px;font-size:13px;font-weight:700;cursor:pointer">🗑️ Usuń</button>';
  h += '</div></div></div>';
  document.body.insertAdjacentHTML('beforeend', h);
}

function confirmDeleteLog(id) {
  var m = document.getElementById('del-log-m');
  if (m) m.remove();
  var entry = S.log.find(function(l){ return l.id === id; });
  if (!entry) return;
  var idx = S.log.findIndex(function(l){ return l.id === id; });
  S.log.splice(idx, 1);
  save(); renderLog();
  toast('🗑️ Wpis usunięty');
}

var DELETED_CACHE = null;

function fetchDeleted() {
  fetch(SRV + '/deleted-log', {signal: AbortSignal.timeout(3000)})
    .then(function(r){ return r.json(); })
    .then(function(j){ DELETED_CACHE = j.entries || []; renderLog(); })
    .catch(function(){ DELETED_CACHE = []; renderLog(); toast('⚠️ Brak połączenia z serwerem'); });
}

function restoreLog(entryJson) {
  var entry = JSON.parse(entryJson);
  S.log.unshift(entry);
  save(); renderLog();
  toast('↩️ Wpis przywrócony do logu');
}

var QUICK_Q = [
  'Które wino sprzedaje się najlepiej?',
  'Ile zarobiliśmy?',
  'Ile butelek zostało?',
  'Kiedy był największy ruch?',
  'Ile kieliszków poza stoiskiem?',
  'Które wino się kończy?',
  'Podsumuj dzień'
];

function renderAI() {
  var h = '<div class="ai-sec fade" style="height:calc(100% - 0px)">';
  h += '<div class="ai-msgs" id="ai-msgs">';

  if (AI_MSGS.length === 0) {
    h += '<div class="ai-msg bot"><div class="bot-label">🤖 SOMMELIER AI</div>Cześć! Jestem Twoim asystentem sprzedaży. Pytaj mnie o statystyki, stan magazynu, przychody — odpowiem na podstawie aktualnych danych. Wybierz szybkie pytanie lub wpisz własne.</div>';
  } else {
    AI_MSGS.forEach(function(m){
      h += '<div class="ai-msg ' + m.role + '">' + (m.role==='bot'?'<div class="bot-label">🤖 SOMMELIER AI</div>':'') + esc(m.text).replace(/\n/g,'<br>') + '</div>';
    });
  }

  h += '</div>';
  h += '<div class="ai-quick">';
  QUICK_Q.forEach(function(q){
    h += '<div class="ai-qbtn" onclick="askAI(\'' + esc(q) + '\')">' + esc(q) + '</div>';
  });
  h += '</div>';
  h += '<div class="ai-input-row">';
  h += '<textarea class="ai-input" id="ai-inp" placeholder="Zapytaj o statystyki..." rows="1" onkeydown="aiKey(event)"></textarea>';
  h += '<button class="ai-send" onclick="aiSend()">▶</button>';
  h += '</div>';
  h += '</div>';
  document.getElementById('cnt').innerHTML = h;
  scrollAI();
}

function aiKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); aiSend(); }
}

function aiSend() {
  var inp = document.getElementById('ai-inp');
  if (!inp) return;
  var q = inp.value.trim();
  if (!q) return;
  inp.value = '';
  askAI(q);
}

function askAI(q) {
  AI_MSGS.push({role:'user', text:q});
  var answer = computeAnswer(q);
  AI_MSGS.push({role:'bot', text:answer});
  renderAI();
}

function computeAnswer(q) {
  var ql = q.toLowerCase();
  var rev = totalRev(), dg = totalDg(), bt = totalBt();
  var byRev = S.wines.slice().sort(function(a,b){ return b.rev-a.rev; });
  var byDg  = S.wines.slice().sort(function(a,b){ return b.dg-a.dg; });
  var byBt  = S.wines.slice().sort(function(a,b){ return b.bt-a.bt; });

  // Ile zarobiliśmy / przychód
  if (/zarobili|przychód|utarg|kasa|zarobek/.test(ql)) {
    var txt = 'Aktualny przychód ze sprzedaży:\n\n💰 ' + fmt(rev) + '\n\n';
    txt += '  🥂 Degustacje: ' + dg + ' szt. × 5 zł = ' + fmt(dg*5) + '\n';
    txt += '  🍾 Butelki: ' + bt + ' szt. = ' + fmt(rev - dg*5) + '\n\n';
    txt += '💳 Pobrane kaucje: ' + fmt(depColl()) + '\n';
    txt += '💳 Zwrócone kaucje: ' + fmt(depRet()) + '\n';
    txt += '🏦 Stan kasy: ' + fmt(expectedCash());
    return txt;
  }

  // Najlepsze / top wino
  if (/najlepiej|top|najpopularniejsz|lider|sprzedaje/.test(ql)) {
    var txt = 'Ranking win wg przychodu:\n\n';
    byRev.slice(0,5).forEach(function(w,i){
      if (w.rev === 0) return;
      txt += (i+1) + '. ' + w.name + '\n';
      txt += '   💰 ' + fmt(w.rev) + '  |  🥂 ' + w.dg + '  |  🍾 ' + w.bt + '\n';
    });
    if (byRev[0].rev > 0) txt += '\n🏆 Lider: ' + byRev[0].name;
    else txt = 'Brak sprzedaży jeszcze.';
    return txt;
  }

  // Butelki / magazyn / zostało
  if (/butelek|magazyn|zostało|stan|zapas/.test(ql)) {
    var total = S.wines.reduce(function(s,w){ return s+bottlesLeft(w); }, 0);
    var txt = 'Stan magazynu:\n\n📦 Łącznie: ' + total + ' butelek\n\n';
    var low = S.wines.filter(function(w){ return bottlesLeft(w) <= 3; });
    if (low.length > 0) {
      txt += '⚠️ KOŃCZĄCE SIĘ:\n';
      low.forEach(function(w){ txt += '  • ' + w.name + ': ' + bottlesLeft(w) + ' but.\n'; });
      txt += '\n';
    }
    var types = ['białe','różowe','czerwone'];
    types.forEach(function(t){
      txt += t.toUpperCase() + ':\n';
      S.wines.filter(function(w){ return w.type===t; }).forEach(function(w){
        var bl = bottlesLeft(w);
        var indicator = bl > 6 ? '🟢' : bl >= 4 ? '🟡' : bl >= 2 ? '🟠' : bl === 1 ? '🔴' : '⛔';
        txt += '  ' + indicator + ' ' + w.name + ': ' + bl + ' but. (' + w.ml + ' ml)\n';
      });
    });
    return txt;
  }

  // Kieliszki
  if (/kieliszk|kaucj|depozyt/.test(ql)) {
    var avail = TOTAL_GLASSES - outside();
    return 'Stan kieliszków:\n\n🥂 Dostępnych: ' + avail + '\n' +
           '📤 Poza stoiskiem: ' + outside() + '\n' +
           '📋 Wydanych łącznie: ' + S.glasses.issued + '\n' +
           '✅ Zwróconych: ' + S.glasses.returned + '\n\n' +
           '💰 Pobrane kaucje: ' + fmt(depColl()) + '\n' +
           '💸 Zwrócone kaucje: ' + fmt(depRet()) + '\n' +
           '⚖️ Saldo kaucji: ' + fmt(depBal());
  }

  // Ruch / godziny
  if (/ruch|godzin|kiedy|pora/.test(ql)) {
    var hourly = {};
    S.log.forEach(function(l){
      if (l.type !== 'degustacja' && l.type !== 'butelka') return;
      var hr = new Date(l.ts).getHours();
      if (!hourly[hr]) hourly[hr] = {cnt:0, rev:0};
      hourly[hr].cnt++;
      hourly[hr].rev += l.amt||0;
    });
    var hours = Object.keys(hourly).sort(function(a,b){ return b-a; });
    if (hours.length === 0) return 'Brak danych godzinowych jeszcze.';
    var bestH = hours.reduce(function(best, h){ return hourly[h].rev > hourly[best].rev ? h : best; });
    var txt = 'Sprzedaż wg godzin:\n\n';
    Object.keys(hourly).sort(function(a,b){ return a-b; }).forEach(function(hr){
      var bar = '█'.repeat(Math.round(hourly[hr].cnt/2)) || '▏';
      txt += hr + ':00  ' + bar + '  ' + hourly[hr].cnt + ' transakcji (' + fmtN(hourly[hr].rev) + ' zł)\n';
    });
    txt += '\n🔥 Największy ruch: godz. ' + bestH + ':00 (' + hourly[bestH].cnt + ' transakcji)';
    return txt;
  }

  // Kończące się
  if (/kończy|kończ|alarm|alert|mało/.test(ql)) {
    var low2 = S.wines.filter(function(w){ return bottlesLeft(w) <= 3; });
    if (low2.length === 0) return '✅ Wszystkie wina mają wystarczający zapas (powyżej 3 butelek).';
    var txt2 = '⚠️ Wina wymagające uwagi (' + low2.length + '):\n\n';
    low2.forEach(function(w){
      var bl = bottlesLeft(w);
      var s = bl === 0 ? '⛔ BRAK' : bl === 1 ? '🔴 ' + bl + ' but.' : '🟠 ' + bl + ' but.';
      txt2 += '• ' + w.name + ': ' + s + '\n';
    });
    return txt2;
  }

  // Podsumowanie
  if (/podsumuj|podsumowanie|raport|dzień|overview/.test(ql)) {
    var top = byRev[0] && byRev[0].rev > 0 ? byRev[0] : null;
    var low3 = S.wines.filter(function(w){ return bottlesLeft(w) <= 3; }).length;
    return 'PODSUMOWANIE DNIA:\n\n' +
      '💰 Przychód: ' + fmt(rev) + '\n' +
      '🥂 Degustacje: ' + dg + ' szt.\n' +
      '🍾 Butelki: ' + bt + ' szt.\n' +
      '👥 Klientów est.: ' + (dg+bt) + '\n' +
      '🏦 Stan kasy (bez kaucji): ' + fmt(expectedCash()) + '\n' +
      '🥂 Kaucje do rozliczenia: ' + fmt(depBal()) + ' (osobno)\n' +
      (top ? '🏆 Lider: ' + top.name + ' (' + fmt(top.rev) + ')\n' : '') +
      (low3 > 0 ? '⚠️ Wina kończące się: ' + low3 + ' szt.' : '✅ Magazyn OK');
  }

  // Default
  return 'Mogę odpowiedzieć na pytania o:\n\n' +
    '• 💰 Przychody i sprzedaż\n' +
    '• 🏆 Najlepiej sprzedające się wina\n' +
    '• 📦 Stan magazynu\n' +
    '• 🥂 Kieliszki i kaucje\n' +
    '• 🕐 Ruch godzinowy\n' +
    '• ⚠️ Kończące się wina\n' +
    '• 📊 Podsumowanie dnia\n\n' +
    'Zapytaj np.: "Które wino sprzedaje się najlepiej?" lub "Ile zarobiliśmy?"';
}

function scrollAI() {
  setTimeout(function(){
    var el = document.getElementById('ai-msgs');
    if (el) el.scrollTop = el.scrollHeight;
  }, 50);
}

function confirmEditDay(id) {
  var d = (S.dayHistory||[]).find(function(x){ return x.id===id; });
  if (!d) return;
  d.label       = document.getElementById('ed-label').value.trim() || d.label;
  d.date        = document.getElementById('ed-date').value || d.date;
  d.glassIssued  = parseInt(document.getElementById('ed-gi').value)||0;
  d.glassReturned= parseInt(document.getElementById('ed-gr').value)||0;
  if (d.fullState) {
    try {
      var fs2 = JSON.parse(d.fullState);
      fs2.glasses.issued   = d.glassIssued;
      fs2.glasses.returned = d.glassReturned;
      fs2._viewLabel = d.label;
      d.fullState = JSON.stringify(fs2);
    } catch(e){}
  }
  document.getElementById('editday-m').remove();
  save(); renderTab();
  toast('✅ Dzień zaktualizowany');
}

function confirmOwnerBottles() {
  var wid  = document.getElementById('own-wine').value;
  var qty  = Math.max(1, parseInt(document.getElementById('own-qty').value)||1);
  var note = document.getElementById('own-note').value.trim();
  var w    = S.wines.find(function(x){ return x.id===wid; });
  if (!w) return;
  w.ml = Math.max(0, w.ml - qty * BOTTLE_ML);
  S.log.unshift({id:uid(), ts:Date.now(), type:'wlasciciel', wine:w.name, qty:qty, amt:0, desc:note||'właściciel'});
  document.getElementById('own-m').remove();
  save(); renderTab();
  toast('📦 ' + qty + ' but. ' + w.name + ' — właściciel');
}

function exportEventHtml(ids) {
  var days = ids.map(function(id){ return (S.dayHistory||[]).find(function(d){ return d.id===id; }); }).filter(Boolean);
  if (!days.length) return;
  var total = {rev:0, dg:0, bt:0, bags:0, gi:0, gr:0};
  var wineMap = {}, hourMap = {}, payMap = {GOT:0,KAR:0,BLI:0}, discTotal = 0, discCnt = 0;
  days.forEach(function(d){
    total.rev += d.rev||0; total.dg += d.dg||0; total.bt += d.bt||0;
    total.bags += d.bags||0; total.gi += d.glassIssued||0; total.gr += d.glassReturned||0;
    (d.wines||[]).forEach(function(w){
      if (!wineMap[w.id]) wineMap[w.id] = {name:w.name, dg:0, bt:0, rev:0};
      wineMap[w.id].dg += w.dg||0; wineMap[w.id].bt += w.bt||0; wineMap[w.id].rev += w.rev||0;
    });
    var p2 = parseExportData(d);

  var pRows = ['GOT','KAR','BLI'].filter(function(pt){ return payMap[pt]>0; }).map(function(pt,i){ var bg=i%2===0?'#fff':'#faf7f2'; var pct=total.rev>0?Math.round(payMap[pt]/total.rev*100):0; return '<tr style="background:'+bg+'"><td style="padding:7px 12px;font-size:13px">'+payNames[pt]+'</td><td style="padding:7px 12px;text-align:right;font-size:13px;font-weight:700">'+n2(payMap[pt])+' zł</td><td style="padding:7px 12px;text-align:right;font-size:13px;color:#888">'+pct+'%</td></tr>'; }).join('');

  var html = '<!DOCTYPE html><html lang="pl"><head><meta charset="UTF-8"><title>Raport imprezy</title><style>@page{margin:14mm}body{font-family:Georgia,serif;background:#fff;color:#1a1a2e;margin:0;padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}*{box-sizing:border-box}.page{max-width:860px;margin:0 auto;padding:28px}h2{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:#8b2030;border-bottom:2px solid #8b2030;padding-bottom:6px;margin:24px 0 14px;font-family:-apple-system,sans-serif}table{width:100%;border-collapse:collapse;font-family:-apple-system,sans-serif}th{background:#8b2030;color:#fff;padding:8px 12px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;text-align:left}th:not(:first-child){text-align:center}th:last-child{text-align:right}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0}.metric{background:#f9f6f2;border:1px solid #e8dfd0;border-radius:10px;padding:16px;text-align:center}.metric-val{font-size:26px;font-weight:700;color:#8b2030;line-height:1}.metric-label{font-family:-apple-system,sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#888;margin-top:5px}.print-btn{position:fixed;top:16px;right:16px;background:#8b2030;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:sans-serif}.foot{margin-top:30px;text-align:center;font-family:sans-serif;font-size:11px;color:#aaa;border-top:1px solid #e8dfd0;padding-top:14px}@media print{.print-btn{display:none}.page{padding:0}}</style></head><body>';

  if (discCnt > 0) { var dp = total.rev>0?(discTotal/(total.rev+discTotal)*100).toFixed(1):'0'; html += '<h2>Rabaty</h2><div style="background:#fff8ec;border:1px solid #f0c060;border-radius:8px;padding:12px 16px;font-family:sans-serif;font-size:13px">Udzielono <strong>'+discCnt+'</strong> rabatów · łącznie <strong style="color:#e67e22">−'+n2(discTotal)+' zł</strong> · <strong style="color:#e67e22">−'+dp+'%</strong> pełnej ceny</div>'; }

function exportEventCsv(ids) {
  var days = ids.map(function(id){ return (S.dayHistory||[]).find(function(d){ return d.id===id; }); }).filter(Boolean);
  if (!days.length) return;
  var total = {rev:0,dg:0,bt:0,bags:0,gi:0,gr:0};
  var wineMap = {}, hourMap = {};
  days.forEach(function(d){
    total.rev+=d.rev||0; total.dg+=d.dg||0; total.bt+=d.bt||0; total.bags+=d.bags||0; total.gi+=d.glassIssued||0; total.gr+=d.glassReturned||0;
    (d.wines||[]).forEach(function(w){ if (!wineMap[w.id]) wineMap[w.id]={name:w.name,dg:0,bt:0,rev:0}; wineMap[w.id].dg+=w.dg||0; wineMap[w.id].bt+=w.bt||0; wineMap[w.id].rev+=w.rev||0; });
    var p2=parseExportData(d); Object.keys(p2.hourMap).forEach(function(h){ if (!hourMap[h]) hourMap[h]={dg:0,bt:0,rev:0}; hourMap[h].dg+=p2.hourMap[h].dg; hourMap[h].bt+=p2.hourMap[h].bt; hourMap[h].rev+=p2.hourMap[h].rev; });
  });
  var q=function(s){ return '"'+String(s||'').replace(/"/g,'""')+'"'; };
  var r=function(arr){ return arr.map(q).join(','); };
  var rows=['﻿'];
  rows.push(r(['IMPREZA','Dni: '+days.map(function(d){return d.label;}).join(', ')]));
  rows.push(r(['Przychód łączny',n2(total.rev)+' zł']));
  rows.push(r(['Degustacje',total.dg])); rows.push(r(['Butelki',total.bt])); rows.push(r(['Torby',total.bags]));
  rows.push(r(['Kieliszki wydane',total.gi])); rows.push(r(['Kieliszki zwrócone',total.gr])); rows.push('');
  rows.push(r(['DNI','Data','Przychód','Degustacje','Butelki','Torby']));
  days.forEach(function(d){ rows.push(r([d.label,d.date||'',n2(d.rev),d.dg,d.bt,d.bags||0])); }); rows.push('');
  rows.push(r(['WINA ŁĄCZNIE','Degustacje','Butelki','Przychód']));
  Object.keys(wineMap).forEach(function(k){ var w=wineMap[k]; if(w.dg||w.bt) rows.push(r([w.name,w.dg,w.bt,n2(w.rev)+' zł'])); }); rows.push('');
  var hours=Object.keys(hourMap).sort(function(a,b){return +a-+b;});
  if (hours.length) { rows.push(r(['GODZINOWO','Degustacje','Butelki','Przychód'])); hours.forEach(function(h){ var e=hourMap[h]; rows.push(r([h+'–'+(+h+1),e.dg,e.bt,n2(e.rev)+' zł'])); }); }
  downloadFile(rows.join('\n'),'impreza-suma.csv','text/csv;charset=utf-8');
  toast('📊 Pobrano CSV imprezy');
}

function renderDaySum(days) {
  var total = {rev:0, dg:0, bt:0, bags:0, gi:0, gr:0};
  var wineMap = {};
  days.forEach(function(d){
    total.rev  += d.rev||0;
    total.dg   += d.dg||0;
    total.bt   += d.bt||0;
    total.bags += d.bags||0;
    total.gi   += d.glassIssued||0;
    total.gr   += d.glassReturned||0;
    (d.wines||[]).forEach(function(w){
      if (!wineMap[w.id]) wineMap[w.id] = {name:w.name, dg:0, bt:0, rev:0};
      wineMap[w.id].dg  += w.dg||0;
      wineMap[w.id].bt  += w.bt||0;
      wineMap[w.id].rev += w.rev||0;
    });
  });
  var wines = Object.values ? Object.values(wineMap) : Object.keys(wineMap).map(function(k){ return wineMap[k]; });
  wines.sort(function(a,b){ return b.rev-a.rev; });
  var maxWR = wines.reduce(function(m,w){ return Math.max(m,w.rev); }, 1);

  var h2 = '<div class="st-card" style="border-color:rgba(200,168,75,.3)">';
  h2 += '<div class="st-title">➕ Suma imprezy — ' + days.length + ' ' + (days.length===1?'dzień':days.length<=4?'dni':'dni') + '</div>';
  h2 += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px">';
  h2 += '<div style="background:var(--s2);border-radius:8px;padding:8px;text-align:center"><div style="font-size:18px;font-weight:700;color:var(--gold)">' + fmtN(total.rev) + ' zł</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">Przychód</div></div>';
  h2 += '<div style="background:var(--s2);border-radius:8px;padding:8px;text-align:center"><div style="font-size:18px;font-weight:700;color:var(--text)">' + total.dg + '</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">🥂 Degustr.</div></div>';
  h2 += '<div style="background:var(--s2);border-radius:8px;padding:8px;text-align:center"><div style="font-size:18px;font-weight:700;color:var(--text)">' + total.bt + '</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">🍾 Butelki</div></div>';
  h2 += '<div style="background:var(--s2);border-radius:8px;padding:8px;text-align:center"><div style="font-size:18px;font-weight:700;color:var(--text)">' + total.bags + '</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">🛍️ Torby</div></div>';
  h2 += '</div>';
  if (wines.length > 0) {
    h2 += '<div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Wina łącznie</div>';
    wines.forEach(function(w){
      if (!w.dg && !w.bt) return;
      var pct = Math.round(w.rev/maxWR*100);
      h2 += '<div style="margin-bottom:5px">';
      h2 += '<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px">';
      h2 += '<span style="color:var(--muted)">' + esc(w.name) + '</span>';
      h2 += '<span>🥂' + w.dg + ' 🍾' + w.bt + ' <strong style="color:var(--gold)">' + fmtN(w.rev) + ' zł</strong></span></div>';
      h2 += '<div style="background:var(--s3);border-radius:3px;height:4px"><div style="width:' + pct + '%;background:var(--gold);border-radius:3px;height:4px"></div></div>';
      h2 += '</div>';
    });
  }
  if (total.gi > 0) {
    h2 += '<div style="font-size:11px;color:var(--muted);margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.05)">🥂 Kieliszki: wydano <strong style="color:var(--text)">' + total.gi + '</strong> · zwrócono <strong style="color:var(--text)">' + total.gr + '</strong> · poza stoiskiem <strong style="color:var(--text)">' + (total.gi-total.gr) + '</strong></div>';

  h2 += '<button onclick="exportEventCsv(DNI_COMPARE)" style="background:var(--s3);border:1px solid var(--border);color:var(--text);border-radius:var(--rsm);padding:9px;font-size:11px;font-weight:700;cursor:pointer">📊 CSV</button>';
  h2 += '<button onclick="DNI_COMPARE=[];renderTab()" style="background:var(--s3);border:1px solid var(--border);color:var(--muted);border-radius:var(--rsm);padding:9px;font-size:11px;cursor:pointer">✕ Wyczyść</button>';
  h2 += '</div>';
  h2 += '</div>';
  return h2;

function parseExportData(d) {
  var fs = null;
  try { if (d.fullState) fs = JSON.parse(d.fullState); } catch(e){}
  var log = (fs && fs.log) ? fs.log : [];
  var fsWines = (fs && fs.wines) ? fs.wines : [];
  var fsCash  = (fs && fs.cash)  ? fs.cash  : null;
  var fsBags  = (fs && fs.bags)  ? fs.bags  : null;
  var fsGlass = (fs && fs.glasses) ? fs.glasses : null;

  // Per-hour
  var hourMap = {};
  // Per-payment
  var payMap = {GOT:{rev:0,cnt:0}, KAR:{rev:0,cnt:0}, BLI:{rev:0,cnt:0}};
  // Discounts
  var discTotal = 0, discCnt = 0;
  // Wine hour map
  var wineHourMap = {};

  log.forEach(function(e) {
    var ms = (e.ts > 1e11) ? e.ts : e.ts * 1000;
    var hh = new Date(ms).getHours();
    var isSale = e.type === 'degustacja' || e.type === 'butelka' || e.type === 'torba';
    if (isSale && e.amt > 0) {
      if (!hourMap[hh]) hourMap[hh] = {dg:0,bt:0,bag:0,rev:0};
      if (e.type === 'degustacja') { hourMap[hh].dg++; }
      if (e.type === 'butelka')    { hourMap[hh].bt++; }
      if (e.type === 'torba')      { hourMap[hh].bag++; }
      hourMap[hh].rev += e.amt;
      if (e.pay && payMap[e.pay]) { payMap[e.pay].rev += e.amt; payMap[e.pay].cnt++; }
      if (e.discount && e.discount > 0) { discTotal += e.discount; discCnt++; }
      if (e.wine && (e.type === 'degustacja' || e.type === 'butelka')) {
        if (!wineHourMap[e.wine]) wineHourMap[e.wine] = {};
        if (!wineHourMap[e.wine][hh]) wineHourMap[e.wine][hh] = {dg:0,bt:0};
        if (e.type === 'degustacja') wineHourMap[e.wine][hh].dg++;
        if (e.type === 'butelka')    wineHourMap[e.wine][hh].bt++;
      }
    }
  });

  // Waste/spill entries
  var wasteEntries = log.filter(function(e){ return e.type === 'korekta' && !e.sub && e.amt === 0 && e.qty > 0; });

  // Bottles opened (from fullState wines)
  var closedBottlesAll = [];
  fsWines.forEach(function(w) {
    if (w.closedBottles && w.closedBottles.length) {
      w.closedBottles.forEach(function(cb) {
        closedBottlesAll.push({wine: w.name, ts: cb.ts, tastings: cb.tastings, avgMl: cb.avgMl, mlCorr: cb.mlCorrection||0});
      });
    }
  });
  closedBottlesAll.sort(function(a,b){ return a.ts - b.ts; });

  var hours = Object.keys(hourMap).sort(function(a,b){return +a-+b;});
  var maxHRev = 1;
  hours.forEach(function(h){ if (hourMap[h].rev > maxHRev) maxHRev = hourMap[h].rev; });
  var bestHour = hours.reduce(function(best, h){ return hourMap[h].rev > (hourMap[best]||{rev:-1}).rev ? h : best; }, hours[0] || null);

  return {fs:fs, log:log, fsWines:fsWines, fsCash:fsCash, fsBags:fsBags, fsGlass:fsGlass,
          hourMap:hourMap, hours:hours, maxHRev:maxHRev, bestHour:bestHour,
          payMap:payMap, discTotal:discTotal, discCnt:discCnt,
          wasteEntries:wasteEntries, closedBottlesAll:closedBottlesAll, wineHourMap:wineHourMap};
}

function n2(n){ return Number(n||0).toFixed(2).replace('.',','); }

    html += '<span>📉 Udzielono rabatów: <strong>' + p.discCnt + ' razy</strong></span>';
    html += '<span>Kwota rabatu: <strong style="color:#e67e22">' + n2(p.discTotal) + ' zł</strong></span>';
    html += '<span>Utracony przychód: <strong style="color:#e67e22">' + discPct + '%</strong> (bez rabatu byłoby ' + n2(totalRev + p.discTotal) + ' zł)</span>';
    html += '</div>';
  }

  // Wine breakdown
  if (wineRows) {
    html += '<h2>Sprzedaż win (wg przychodu)</h2>';
    html += '<table><thead><tr><th>Wino</th><th>🥂 Degustr.</th><th>🍾 Butelki</th><th>Zostało</th><th style="text-align:right">Przychód</th></tr></thead><tbody>' + wineRows + '</tbody></table>';
  }

  // Hourly
  if (p.hours.length > 0) {
    html += '<h2>Sprzedaż godzinowa' + (p.bestHour ? ' — najlepsza godzina: <span style="color:#8b2030">' + p.bestHour + ':00</span>' : '') + '</h2>';
    html += hourlyBars;
    html += '<table><thead><tr><th>Godzina</th><th>🥂 Degustr.</th><th>🍾 Butelki</th><th style="text-align:right">Przychód</th></tr></thead><tbody>' + hourlyRows + '</tbody></table>';
  }

  // Closed bottles
  if (closedHtml) {
    html += '<h2>Otwarte butelki (' + p.closedBottlesAll.length + ')</h2>';
    html += '<table><thead><tr><th>Wino</th><th>Godzina</th><th>Kieliszków</th><th>Śr. nalewka</th><th>Korekta</th></tr></thead><tbody>' + closedHtml + '</tbody></table>';
  }

  // Waste
  if (wasteHtml) {
    html += '<h2>Korekty magazynu / rozlane</h2>';
    html += '<table><thead><tr><th>Wino</th><th>Butelek</th><th>Powód</th><th>Godzina</th></tr></thead><tbody>' + wasteHtml + '</tbody></table>';
  }

  // Glasses
  if (gi > 0 || gr > 0) {
    html += '<h2>Kieliszki i kaucje</h2>';
    html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px">';
    html += '<div class="metric"><div class="metric-val" style="font-size:22px">' + gi + '</div><div class="metric-label">📤 Wydano</div></div>';
    html += '<div class="metric"><div class="metric-val" style="font-size:22px">' + gr + '</div><div class="metric-label">🧺 Zwrócono</div></div>';
    html += '<div class="metric"><div class="metric-val" style="font-size:22px">' + (gi-gr) + '</div><div class="metric-label">🌍 Na zewnątrz</div></div>';
    html += '<div class="metric"><div class="metric-val" style="font-size:22px;color:#e74c3c">' + glassBroken + '</div><div class="metric-label">💀 Rozbite</div></div>';
    html += '</div>';
    var dep = (gi - gr) * 10;
    if (dep > 0) {
      html += '<div style="background:#f9f6f2;border:1px solid #e8dfd0;border-radius:8px;padding:12px 16px;font-family:sans-serif;font-size:13px;display:flex;justify-content:space-between">';
      html += '<span style="color:#888">Saldo kaucji (10 zł/szt.)</span><span style="font-size:18px;font-weight:700;color:#8b2030">+' + n2(dep) + ' zł</span>';
      html += '</div>';
    }
  }

  // Cash
  if (cashHtml) {
    html += '<h2>Stan kasy</h2>' + cashHtml;
  }

  html += '<div class="foot">Raport wygenerowany przez aplikację Święto Wina · ' + genDate + '</div>';
  html += '</div></body></html>';
  return html;
}

function downloadFile(content, filename, mime) {
  var blob = new Blob([content], {type: mime});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename; a.style.display = 'none';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
}

function exportHtmlReport(id) {
  var d = (S.dayHistory||[]).find(function(x){ return x.id===id; });
  if (!d) return;
  var html = buildHtmlReport(d);
  var win = window.open('', '_blank');
  if (win) { win.document.write(html); win.document.close(); }
  else { downloadFile(html, 'raport-' + (d.date||d.label) + '.html', 'text/html;charset=utf-8'); }
}

function exportCsv(id) {
  var d = (S.dayHistory||[]).find(function(x){ return x.id===id; });
  if (!d) return;
  var p = parseExportData(d);
  var rows = ['﻿']; // BOM
  var sep = ',';
  var q = function(s){ return '"' + String(s||'').replace(/"/g,'""') + '"'; };
  var r = function(arr){ return arr.map(q).join(sep); };

  rows.push(r(['PODSUMOWANIE','','']));
  rows.push(r(['Data', d.date||'']));
  rows.push(r(['Etykieta', d.label||'']));
  rows.push(r(['Przychód (zł)', n2(d.rev)]));
  rows.push(r(['Degustacje', d.dg]));
  rows.push(r(['Butelki sprzedane', d.bt]));
  rows.push(r(['Torby', d.bags||0]));
  rows.push(r(['Kieliszki wydane', d.glassIssued||0]));
  rows.push(r(['Kieliszki zwrócone', d.glassReturned||0]));
  rows.push(r(['Rabaty łącznie (zł)', n2(p.discTotal)]));
  rows.push(r(['Rabaty ilość', p.discCnt]));
  rows.push('');

  rows.push(r(['PŁATNOŚCI','Kwota (zł)','Transakcje']));
  var payNames = {GOT:'Gotówka', KAR:'Karta', BLI:'BLIK'};
  ['GOT','KAR','BLI'].forEach(function(pt){
    rows.push(r([payNames[pt], n2(p.payMap[pt].rev), p.payMap[pt].cnt]));
  });
  rows.push('');

  rows.push(r(['WINA','Degustacje','Butelki sprzedane','Zostało butelek','Przychód (zł)']));
  (d.wines||[]).forEach(function(w){
    var fsW = p.fsWines.find(function(x){ return x.id === w.id; });
    var left = fsW ? Math.floor(fsW.ml/750) : '';
    rows.push(r([w.name, w.dg||0, w.bt||0, left, n2(w.rev||0)]));
  });
  rows.push('');

  rows.push(r(['GODZINOWO','Degustacje','Butelki','Torby','Przychód (zł)']));
  p.hours.forEach(function(h){
    var en = p.hourMap[h];
    rows.push(r([h+':00', en.dg, en.bt, en.bag, n2(en.rev)]));
  });
  rows.push('');

  if (p.closedBottlesAll.length > 0) {
    rows.push(r(['OTWARTE BUTELKI','Godzina','Kieliszków','Śr. nalewka (ml)','Korekta (ml)']));
    p.closedBottlesAll.forEach(function(cb){
      var ms = (cb.ts > 1e11) ? cb.ts : cb.ts * 1000;
      var t = new Date(ms).toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
      rows.push(r([cb.wine, t, cb.tastings, cb.avgMl?cb.avgMl.toFixed(0):'', cb.mlCorr?Math.round(cb.mlCorr):'']));
    });
    rows.push('');
  }

  if (p.wasteEntries.length > 0) {
    rows.push(r(['KOREKTY MAGAZYNU','Butelek','Powód','Godzina']));
    p.wasteEntries.forEach(function(e){
      var ms = (e.ts > 1e11) ? e.ts : e.ts * 1000;
      var t = new Date(ms).toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
      rows.push(r([e.wine||'', e.qty, e.desc||'', t]));
    });
  }

  downloadFile(rows.join('\n'), 'swinto-wina-' + (d.date||d.label) + '.csv', 'text/csv;charset=utf-8');
  toast('📊 Pobrano CSV');
}

function exportXls(id) {
  var d = (S.dayHistory||[]).find(function(x){ return x.id===id; });
  if (!d) return;
  var p = parseExportData(d);
  var h = '﻿<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"><style>';
  h += 'table{border-collapse:collapse;font-family:Calibri,Arial,sans-serif;font-size:11pt}';

  h += '.total{background:#f9f6f2;font-weight:bold}';
  h += '</style></head><body>';

  var sec = function(title, cols, rows) {
    var out = '<table><tr><td class="section" colspan="' + cols.length + '">' + title + '</td></tr>';
    out += '<tr>' + cols.map(function(c){ return '<th>' + c + '</th>'; }).join('') + '</tr>';
    rows.forEach(function(row){
      out += '<tr>' + row.map(function(c){ return '<td>' + (c||'') + '</td>'; }).join('') + '</tr>';

  h += sec('PODSUMOWANIE', ['Pole','Wartość'], [
    ['Data', d.date||''], ['Etykieta', d.label||''],
    ['Przychód', n2(d.rev)+' zł'], ['Degustacje', d.dg], ['Butelki', d.bt], ['Torby', d.bags||0],
