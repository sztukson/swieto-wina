  ]);

  var payNames = {GOT:'Gotówka', KAR:'Karta', BLI:'BLIK'};
  h += sec('PŁATNOŚCI', ['Metoda','Kwota','Transakcje'],
    ['GOT','KAR','BLI'].map(function(pt){ return [payNames[pt], n2(p.payMap[pt].rev)+' zł', p.payMap[pt].cnt]; })
  );

  h += sec('WINA', ['Wino','Degustacje','Butelki sprzedane','Zostało','Przychód'],
    (d.wines||[]).map(function(w){
      var fsW = p.fsWines.find(function(x){ return x.id === w.id; });
      return [w.name, w.dg||0, w.bt||0, fsW ? Math.floor(fsW.ml/750) : '', n2(w.rev||0)+' zł'];
    })
  );

  if (p.hours.length > 0) {
    h += sec('GODZINOWO', ['Godzina','Degustacje','Butelki','Torby','Przychód'],
      p.hours.map(function(hr){ var en=p.hourMap[hr]; return [hr+':00', en.dg, en.bt, en.bag, n2(en.rev)+' zł']; })
    );
  }

  if (p.closedBottlesAll.length > 0) {
    h += sec('OTWARTE BUTELKI', ['Wino','Godzina','Kieliszków','Śr. nalewka','Korekta'],
      p.closedBottlesAll.map(function(cb){
        var ms = (cb.ts>1e11)?cb.ts:cb.ts*1000;
        var t = new Date(ms).toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
        return [cb.wine, t, cb.tastings, cb.avgMl?cb.avgMl.toFixed(0)+' ml':'', cb.mlCorr?Math.round(cb.mlCorr)+' ml':''];
      })
    );
  }

  if (p.wasteEntries.length > 0) {
    h += sec('KOREKTY MAGAZYNU', ['Wino','Butelek','Powód','Godzina'],
      p.wasteEntries.map(function(e){
        var ms = (e.ts>1e11)?e.ts:e.ts*1000;
        var t = new Date(ms).toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
        return [e.wine||'', e.qty, e.desc||'', t];
      })
    );
  }

  h += '</body></html>';
  downloadFile(h, 'swinto-wina-' + (d.date||d.label) + '.xls', 'application/vnd.ms-excel;charset=utf-8');
  toast('📈 Pobrano Excel');
}

function buildExportText(d, opts) {
  var fs = null;
  try { if (d.fullState) fs = JSON.parse(d.fullState); } catch(e){}
  var lines = [];
  lines.push('🍷 Święto Wina — ' + d.label);
  lines.push('📅 ' + (d.date || ''));
  lines.push('');
  if (opts.revenue) {
    lines.push('💰 Przychód: ' + fmtN(d.rev) + ' zł');
  }
  if (opts.summary) {
    lines.push('🥂 Degustacje: ' + d.dg + ' kieliszków');
    lines.push('🍾 Butelki sprzedane: ' + d.bt);
    if (d.bags) lines.push('🛍️ Torby: ' + d.bags + ' szt.');
  }
  if (opts.wines && d.wines && d.wines.length > 0) {
    lines.push('');
    lines.push('📊 Sprzedaż win:');
    d.wines.filter(function(w){ return w.dg>0||w.bt>0; }).forEach(function(w){
      var parts = [];
      if (w.dg) parts.push('🥂 ' + w.dg + ' kiel.');
      if (w.bt) parts.push('🍾 ' + w.bt + ' but.');
      lines.push('  • ' + w.name + ': ' + parts.join(', '));
    });
  }
  if (opts.glasses && (d.glassIssued || d.glassReturned)) {
    lines.push('');
    lines.push('🥂 Kieliszki:');
    lines.push('  Wydano: ' + (d.glassIssued||0));
    lines.push('  Zwrócono: ' + (d.glassReturned||0));
    lines.push('  Poza stoiskiem: ' + ((d.glassIssued||0)-(d.glassReturned||0)));
  }
  if (opts.hourly && fs && fs.log && fs.log.length > 0) {
    var hourMap = {};
    fs.log.forEach(function(e){
      if (!e.ts || (!e.dg && !e.bt)) return;
      var hh = new Date(e.ts*1000).getHours();
      if (!hourMap[hh]) hourMap[hh] = {dg:0,bt:0,rev:0};
      hourMap[hh].dg += (e.dg||0);
      hourMap[hh].bt += (e.bt||0);
      hourMap[hh].rev += (e.rev||0);
    });
    var hours = Object.keys(hourMap).sort(function(a,b){return a-b;});
    if (hours.length > 0) {
      lines.push('');
      lines.push('⏰ Sprzedaż godzinowa:');
      hours.forEach(function(hh){
        var entry = hourMap[hh];
        var parts = [];
        if (entry.dg) parts.push('🥂'+entry.dg);
        if (entry.bt) parts.push('🍾'+entry.bt);
        lines.push('  ' + hh + ':00 — ' + parts.join(' ') + ' · ' + fmtN(entry.rev) + ' zł');
      });
    }
  }
  lines.push('');
  lines.push('🍇 Winiarski Festyn');
  return lines.join('\n');
}

function copyExport() {
  var el = document.getElementById('exp-preview');
  if (!el) return;
  var txt = el.textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(function(){ toast('📋 Skopiowano!'); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = txt; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    toast('📋 Skopiowano!');
  }
}

function shareExport() {
  var el = document.getElementById('exp-preview');

}

function confirmDelivery() {
  var total = 0;
  var lines = [];
  S.wines.forEach(function(w) {
    var inp = document.getElementById('d' + w.id);
    if (!inp) return;
    var qty = parseInt(inp.value) || 0;
    if (qty <= 0) return;
    w.ml += qty * BOTTLE_ML;
    total += qty;
    lines.push(qty + '× ' + w.name);
    addLog('dostawa', w.name, qty, 0);
  });
  if (total === 0) { toast('Wpisz ilość butelek'); return; }
  document.getElementById('del-m').remove();
  save(); renderTab();
  toast('📦 Dostawa: ' + lines.join(', '), 5000);
}

function fmtFullTime(ts) {
  var d = new Date(ts);
  var dd = String(d.getDate()).padStart(2,'0');
  var mm = String(d.getMonth()+1).padStart(2,'0');
  var yy = d.getFullYear();
  var hh = String(d.getHours()).padStart(2,'0');
  var mi = String(d.getMinutes()).padStart(2,'0');
  var ss = String(d.getSeconds()).padStart(2,'0');
  return yy+'-'+mm+'-'+dd+' '+hh+':'+mi+':'+ss;
}

function exportData() {
  var data = localStorage.getItem('sw_v3');
  if (!data) { toast('⚠️ Brak danych do eksportu'); return; }
  var now = new Date();
  var ds = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  var ts = String(now.getHours()).padStart(2,'0') + String(now.getMinutes()).padStart(2,'0');
  downloadFile(data, 'swietowina-backup-' + ds + '_' + ts + '.json', 'application/json;charset=utf-8');
  toast('💾 Dane wyeksportowane');
}

function importData() {
  var inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json,application/json';
  inp.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var parsed = JSON.parse(ev.target.result);
        if (!parsed.wines && !parsed.log && !parsed.dayHistory) throw new Error('Nieprawidłowy format');
        localStorage.setItem('sw_v3', JSON.stringify(parsed));
        load(); // uruchamia wszystkie migracje (migrateWine, cash.initial, bags, dayHistory…)
        var m = document.getElementById('set-m');
        if (m) m.remove();
        var nDni = (S.dayHistory||[]).length;
        toast('✅ Dane wczytane' + (nDni ? ' — ' + nDni + ' dni' : ''));
        renderTab();
      } catch(err) {
        toast('❌ Błąd: ' + err.message);
      }
    };
    reader.readAsText(file, 'utf-8');
  };
  inp.click();
}

function sbRenderAccessList() {
  if (!_sb) return;
  _sb.from('allowed_users').select('*').order('created_at')
    .then(function(res) {
      var el = document.getElementById('access-list');
      if (!el) return;
      var data = res.data || [];
      if (data.length === 0) { el.innerHTML = '<div style="padding:10px 12px;font-size:12px;color:var(--muted)">Brak użytkowników</div>'; return; }
      el.innerHTML = data.map(function(u) {
        var isMe = u.email === (SB_USER && SB_USER.email);
        return '<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid var(--border)">' +
          '<div><div style="font-size:12px;color:var(--text)">' + esc(u.email) + (isMe ? ' <span style="font-size:10px;color:var(--muted)">(Ty)</span>' : '') + '</div>' +
          '<div style="font-size:10px;color:var(--muted);margin-top:1px">' + (u.is_admin ? '👑 Admin' : '👤 Użytkownik') + '</div></div>' +
          (!isMe ? '<button onclick="sbRemoveUser(\'' + esc(u.email) + '\')" style="background:var(--s3);border:1px solid var(--dim);color:var(--red);border-radius:var(--rsm);padding:4px 10px;font-size:12px;cursor:pointer;font-weight:700">✕</button>' : '') +
          '</div>';
      }).join('');
    }).catch(function() {
      var el = document.getElementById('access-list');
      if (el) el.innerHTML = '<div style="padding:10px 12px;font-size:12px;color:var(--red)">Błąd ładowania</div>';
    });
}

function sbAddUser() {
  if (!_sb) return;
  var el = document.getElementById('new-user-email');
  if (!el) return;
  var email = el.value.trim().toLowerCase();
  if (!email || !email.includes('@')) { toast('Wpisz poprawny email'); return; }
  _sb.from('allowed_users').insert({ email: email, is_admin: false })
    .then(function(res) {
      if (res.error) { toast('Błąd: ' + (res.error.message || 'już istnieje?')); return; }
      el.value = '';
      toast('✅ Dodano: ' + email);
      sbRenderAccessList();
    });
}

function sbRemoveUser(email) {
  if (!_sb || !confirm('Usunąć dostęp dla: ' + email + '?')) return;
  _sb.from('allowed_users').delete().eq('email', email)
    .then(function(res) {
      if (res.error) { toast('Błąd usuwania'); return; }
      toast('Usunięto: ' + email);
      sbRenderAccessList();
    });
}

function hardReset() {
  if (!confirm('⚠️ UWAGA! To skasuje WSZYSTKO — wina, sprzedaż, kieliszki, kasę i log. Operacji NIE DA SIĘ cofnąć.\n\nKontynuować?')) return;
  // Drugie zabezpieczenie: trzeba wpisać słowo RESET
  var typed = prompt('Aby potwierdzić całkowite skasowanie, wpisz wielkimi literami:  RESET');
  if (typed === null) return;
  if (typed.trim().toUpperCase() !== 'RESET') { alert('Anulowano — nie wpisano „RESET".'); return; }
  S = defState(); AI_MSGS = [];
  save();
  document.getElementById('set-m').remove();
  toast('🔄 Reset wykonany');
  renderTab();
}

function resetSales() {
  if (!confirm('↩️ Zresetować dane sprzedaży?\n\nWyzeruje sprzedaż, kieliszki, kasę i log. Lista win zostaje.')) return;
  // Drugie zabezpieczenie
  if (!confirm('Na pewno? Tej operacji NIE DA SIĘ cofnąć.')) return;
  S.wines = CATALOG.map(mkWine);
  S.glasses = {issued:0, returned:0, washed:0, broken:0};
  S.log = []; S.cash.ops = [];
  save();
  document.getElementById('set-m').remove();
  toast('↩️ Sprzedaż zresetowana');
  renderTab();
}

// ─────────────────────────────────────────────
// CASH REVEAL
// ─────────────────────────────────────────────
var CASH_VISIBLE = false;
var CASH_HIDE_T = null;
var REV_VISIBLE = false;
var REV_HIDE_T = null;

function toggleRev() {
  REV_VISIBLE = !REV_VISIBLE;
  var val = document.getElementById('rev-db-val');
  var sub = document.getElementById('rev-db-sub');
  if (!val) return;
  if (REV_VISIBLE) {
    val.style.filter = 'none'; sub.style.filter = 'none';
    clearTimeout(REV_HIDE_T);
    REV_HIDE_T = setTimeout(function(){ REV_VISIBLE = false; toggleRev(); }, 10000);
  } else {
    val.style.filter = 'blur(8px)'; sub.style.filter = 'blur(6px)';
    clearTimeout(REV_HIDE_T);
  }
}

function toggleCash() {
  CASH_VISIBLE = !CASH_VISIBLE;
  var val = document.getElementById('cash-db-val');
  var sub = document.getElementById('cash-db-sub');
  var eye = document.getElementById('cash-eye');
  if (!val) return;
  if (CASH_VISIBLE) {
    val.style.filter = 'none';
    sub.style.filter = 'none';
    if (eye) eye.textContent = '👁 kliknij aby ukryć';
    clearTimeout(CASH_HIDE_T);
    CASH_HIDE_T = setTimeout(function(){ CASH_VISIBLE = false; toggleCash(); }, 10000);
  } else {
    val.style.filter = 'blur(8px)';
    sub.style.filter = 'blur(6px)';
    if (eye) eye.textContent = '👁 kliknij aby pokazać';
    clearTimeout(CASH_HIDE_T);
  }
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
var FIRST_RUN = !localStorage.getItem('sw_v3'); // pusta pamięć = pierwsze uruchomienie
// Tryb dzień/noc — wczytaj zapis (domyślnie noc)
try { applyTheme(localStorage.getItem('sw_theme') === 'light'); } catch(e){}
load();
go('home');
sbInit();

// PWA — service worker (offline + instalacja na ekranie głównym)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('service-worker.js').catch(function(e){ console.warn('SW:', e); });
  });
}

// Pierwsze uruchomienie z wbudowanymi danymi — zapytaj czy wczytać
var OFFERED_BUNDLE = false;
(function offerBundledData() {
  if (!FIRST_RUN) return;
  if (typeof window.BUNDLED_DATA === 'undefined' || !window.BUNDLED_DATA) return;
  var bd = window.BUNDLED_DATA;
  var dni = (bd.dayHistory || []).length;
  var daty = (bd.dayHistory || []).map(function(d){ return d.date; }).filter(Boolean);
  OFFERED_BUNDLE = true;
  setTimeout(function() {
    var h = '<div id="bundle-m" style="position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)">';
    h += '<div style="background:var(--s1);border:1px solid rgba(200,168,75,.4);border-radius:var(--r);padding:24px 20px;width:300px;display:flex;flex-direction:column;gap:14px;text-align:center">';
    h += '<div style="font-size:40px">🍷</div>';
    h += '<div style="font-family:Georgia,serif;font-size:18px;color:var(--gold)">Witaj!</div>';
    h += '<div style="font-size:13px;color:var(--text);line-height:1.6">Znaleziono zapisane dane festiwalu<br><strong>' + dni + ' ' + (dni===1?'dzień':'dni') + '</strong>' + (daty.length ? ' (' + daty.join(', ') + ')' : '') + '.<br>Chcesz je wczytać?</div>';
    h += '<button onclick="acceptBundle()" style="background:var(--wine);border:none;color:#fff;border-radius:var(--rsm);padding:13px;font-size:14px;font-weight:700;cursor:pointer">📥 Wczytaj te dane festiwalu</button>';
    h += '<button onclick="document.getElementById(\'bundle-m\').remove();importData()" style="background:var(--s3);border:1px solid var(--gold2);color:var(--gold);border-radius:var(--rsm);padding:11px;font-size:13px;font-weight:700;cursor:pointer">📂 Wybierz inny plik z dysku…</button>';
    h += '<button onclick="document.getElementById(\'bundle-m\').remove()" style="background:var(--s3);border:1px solid var(--border);color:var(--muted);border-radius:var(--rsm);padding:11px;font-size:13px;font-weight:700;cursor:pointer">Zacznij od nowa (pusto)</button>';
    h += '<div style="font-size:10px;color:var(--muted);line-height:1.4">Zawsze możesz wczytać/zmienić później: ⚙️ → Importuj dane</div>';
    h += '</div></div>';
    document.body.insertAdjacentHTML('beforeend', h);
  }, 300);
})();

function acceptBundle() {
  var m = document.getElementById('bundle-m');
  if (m) m.remove();
  try {
    localStorage.setItem('sw_v3', JSON.stringify(window.BUNDLED_DATA));
    load(); // migracje
    var n = (S.dayHistory||[]).length;
    toast('✅ Wczytano dane festiwalu — ' + n + ' dni');
    renderTab();
  } catch(e) {
    toast('❌ Błąd wczytywania: ' + e.message);
  }
}

// Alert: poprzedni dzień niezamknięty
(function checkPrevDay() {
  if (OFFERED_BUNDLE) return; // nie nakładaj alertu na powitanie z danymi
  var today = new Date().toISOString().slice(0,10);
  var yest  = new Date(); yest.setDate(yest.getDate()-1);
  var yesterday = yest.toISOString().slice(0,10);
  var hist = S.dayHistory || [];
  // Pokaż alert tylko jeśli wczoraj nie był zapisany
  var yesterdaySaved = hist.some(function(d){ return d.date === yesterday; });
  if (!yesterdaySaved) {
    setTimeout(function() {
      var h = '<div id="prevday-m" style="position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center">';
      h += '<div style="background:var(--s1);border:1px solid rgba(230,126,34,.4);border-radius:var(--r);padding:22px;width:290px;display:flex;flex-direction:column;gap:14px">';
      h += '<div style="font-size:24px;text-align:center">⚠️</div>';
      h += '<div style="font-family:Georgia,serif;font-size:16px;color:var(--orange);text-align:center">Dzień nie został zamknięty</div>';
      h += '<div style="font-size:13px;color:var(--muted);text-align:center;line-height:1.5">Wczoraj (' + yesterday + ') nie zapisałeś podsumowania dnia.<br>Chcesz zapisać teraz?</div>';
      h += '<button onclick="document.getElementById(\'prevday-m\').remove();go(\'dni\');saveDay(\'' + yesterday + '\')" style="background:var(--orange);border:none;color:#fff;border-radius:var(--rsm);padding:12px;font-size:13px;font-weight:700;cursor:pointer">📅 Zapisz wczorajszy dzień</button>';
      h += '<button onclick="document.getElementById(\'prevday-m\').remove()" style="background:var(--s3);border:1px solid var(--border);color:var(--muted);border-radius:var(--rsm);padding:10px;font-size:13px;font-weight:700;cursor:pointer">Pomiń</button>';
      h += '</div></div>';
      document.body.insertAdjacentHTML('beforeend', h);
    }, 1500);
  }
})();
</script>
</body>
</html>
