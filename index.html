<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Święto Wina 🍷</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0b10" id="theme-color-meta">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Święto Wina">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
:root {
  --bg:#0d0b10; --s1:#171220; --s2:#1e1829; --s3:#27213a; --dim:#3a3250;
  --wine:#8b2030; --wine2:#b02a42; --gold:#c8a84b; --gold2:#7a6630;
  --text:#ede5d8; --muted:#7a6f82; --border:rgba(200,168,75,.13);
  --green:#27ae60; --yellow:#f39c12; --orange:#e67e22; --red:#e74c3c; --alarm:#7b0000;
  --r:14px; --rsm:8px; --rlg:20px;
}
/* ☀️ TRYB DZIENNY — wysoki kontrast, czytelny w pełnym słońcu na festynie */
body.light {
  --bg:#f3ece0; --s1:#ffffff; --s2:#faf4ea; --s3:#f0e6d4; --dim:#d8cbb2;
  --wine:#8b2030; --wine2:#a52338; --gold:#8a6d1f; --gold2:#b89a4a;
  --text:#241312; --muted:#6f5f54; --border:rgba(139,32,48,.20);
  --green:#1f8f4d; --yellow:#c87f0a; --orange:#c25a14; --red:#c8341f; --alarm:#7b0000;
}
/* Większe trafienia palcem na telefonie/tablecie */
@media (pointer: coarse) {
  .ni{font-size:10px !important}
  .ni .ic{font-size:22px !important}
  .db-label,.ag-label,.wc-stat-label,.ic-label{font-size:11px !important}
}
/* 📱→📲 TABLET — szersza, wyśrodkowana kolumna + większe elementy (nie rozciąga się na całą szerokość) */
@media (min-width: 700px) {
  #cnt > *{max-width:760px;margin-left:auto;margin-right:auto}
  #hdr,#offline-bar{padding-left:max(14px,calc((100% - 760px)/2));padding-right:max(14px,calc((100% - 760px)/2))}
  #nav{max-width:760px;margin:0 auto;width:100%}
  .wc-name{font-size:17px !important}
  .btn-big{height:60px !important;font-size:15px !important}
  .btn-act{height:74px !important}
  .ni{font-size:12px !important}
  .ni .ic{font-size:26px !important}
  .db-val{font-size:32px}
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100%;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
/* Header */
#hdr{background:linear-gradient(180deg,var(--s2),var(--s1));border-bottom:1px solid var(--border);padding:calc(10px + env(safe-area-inset-top)) 14px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-family:Georgia,serif;font-size:18px;color:var(--gold);font-weight:bold;display:flex;align-items:center;gap:8px}
.srv-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
.srv-dot.on{background:var(--green)}
.srv-dot.err{background:var(--red)}
.hdr-btns{display:flex;gap:6px}
.ibtn{background:var(--s3);border:1px solid var(--border);color:var(--text);border-radius:var(--rsm);width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer}
.ibtn:active{opacity:.7}
/* Content */
#cnt{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
/* Nav */
#nav{display:flex;background:var(--s2);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 2px 5px;cursor:pointer;border:none;background:none;color:var(--muted);font-size:9px;font-weight:600;gap:2px;letter-spacing:.3px;-webkit-tap-highlight-color:transparent}
.ni .ic{font-size:20px;line-height:1}
.ni.on{color:var(--gold)}
.ni:active{opacity:.6}
.more-it{background:var(--s2);border:1px solid var(--border);color:var(--text);border-radius:var(--r);padding:16px 10px;font-size:13px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;line-height:1.1}
.more-it{font-size:24px}
.more-it span{font-size:12px;font-weight:600;color:var(--muted)}
.more-it:active{transform:scale(.95);background:var(--s3)}
/* Toast */
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-40%);background:var(--s3);border:1px solid var(--gold2);color:var(--text);padding:11px 22px;border-radius:30px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:all .22s;white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis;pointer-events:none}
#toast.show{opacity:1;transform:translate(-50%,-50%)}
/* Dashboard */
.db{padding:12px;display:flex;flex-direction:column;gap:10px}
.db-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.db-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:13px}
.db-card.full{grid-column:1/-1}
.db-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:3px}
.db-val{font-size:26px;font-weight:700;line-height:1}
.db-sub{font-size:11px;color:var(--muted);margin-top:3px}
/* Wine cards list */
.wlist{padding:10px;display:flex;flex-direction:column;gap:10px}
.sec-title{font-family:Georgia,serif;font-size:14px;padding:8px 10px 4px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
/* Wine card */
.wc{background:var(--s1);border:1px solid var(--border);border-radius:var(--rlg);overflow:hidden}
.wc.out{border-color:rgba(123,0,0,.5)}
.wc-top{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 14px 8px}
.wc-name{font-family:Georgia,serif;font-size:15px;font-weight:bold;color:var(--text);line-height:1.2}
.wc-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:20px;margin-top:4px;display:inline-block}
.type-białe{background:rgba(200,168,75,.2);color:var(--gold)}
.type-czerwone{background:rgba(176,42,66,.3);color:#e87080}
.type-różowe{background:rgba(212,85,138,.2);color:#d4558a}
.wc-stock{text-align:right;flex-shrink:0;margin-left:10px}
.wc-stock-val{font-size:22px;font-weight:700}
.wc-stock-label{font-size:10px;color:var(--muted);text-align:right}
.wc-stock-ml{font-size:11px;margin-top:1px;text-align:right}
.wc-warn{background:rgba(230,126,34,.15);border-top:1px solid rgba(230,126,34,.3);border-bottom:1px solid rgba(230,126,34,.3);padding:5px 14px;font-size:12px;color:var(--orange);font-weight:600}
.wc-warn.alarm{background:rgba(123,0,0,.2);border-color:rgba(200,0,0,.3);color:#e87070}
.wc-stats{display:flex;gap:0;border-top:1px solid var(--border)}
.wc-stat{flex:1;padding:8px 12px;border-right:1px solid var(--border)}
.wc-stat:last-child{border-right:none}
.wc-stat-label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.wc-stat-val{font-size:15px;font-weight:700;margin-top:1px}
.wc-actions{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border)}
.wc-ag{padding:10px 10px;border-right:1px solid var(--border)}
.wc-ag:last-child{border-right:none}
.ag-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px}
.ag-row{display:flex;gap:6px}
.btn-big{flex:1;border:none;border-radius:var(--rsm);font-size:13px;font-weight:700;height:52px;cursor:pointer;transition:all .1s;display:flex;align-items:center;justify-content:center}
.btn-big:active{transform:scale(.92)}
.btn-plus{background:var(--wine);color:#fff}
.btn-plus:active{background:var(--wine2)}
.btn-plus:disabled{opacity:.35;cursor:not-allowed}
.btn-minus{background:var(--s3);color:var(--muted);border:1px solid var(--dim);flex:0 0 40px;font-size:20px}
.btn-minus:disabled{opacity:.3;cursor:not-allowed}
/* Glasses */
.gl-sec{padding:14px;display:flex;flex-direction:column;gap:12px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ic{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:13px;text-align:center}
.ic-val{font-size:34px;font-weight:700}
.ic-label{font-size:10px;color:var(--muted);margin-top:2px}
.ic.av .ic-val{color:var(--green)}
.ic.out-gl .ic-val{color:var(--wine2)}
.ic.is .ic-val{color:var(--gold)}
.ic.rt .ic-val{color:#5b9bd5}
.act-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-act{border:none;border-radius:var(--r);font-size:13px;font-weight:700;height:62px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:all .1s}
.btn-act:active{transform:scale(.94)}
.btn-act .bico{font-size:22px}
.btn-act.issue{background:var(--wine);color:#fff}
.btn-act.ret{background:var(--s3);border:1px solid var(--green);color:var(--green)}
.btn-act.undo{background:var(--s3);border:1px solid var(--dim);color:var(--muted);font-size:12px}
.dep-box{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.dep-row{display:flex;justify-content:space-between;align-items:center;padding:11px 15px;border-bottom:1px solid var(--border)}
.dep-row:last-child{border-bottom:none}
.dep-rl{font-size:13px;color:var(--muted)}
.dep-rv{font-size:15px;font-weight:700}
.dep-rv.gold{color:var(--gold)}
.dep-rv.red{color:var(--red)}
/* Cash */
.cash-sec{padding:14px;display:flex;flex-direction:column;gap:12px}
.cash-card{background:linear-gradient(135deg,var(--s2),var(--s3));border:1px solid var(--gold2);border-radius:var(--rlg);padding:16px}
.cc-title{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.cc-amt{font-size:38px;font-weight:700;margin:4px 0;line-height:1}
.cc-sub{font-size:12px;color:var(--muted)}
.op-form{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:9px}
.fl{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.fi{background:var(--s3);border:1px solid var(--dim);border-radius:var(--rsm);color:var(--text);font-size:15px;padding:11px 13px;width:100%}
.fi:focus{outline:none;border-color:var(--gold)}
.op-btns{display:flex;gap:7px}
.op-btn{flex:1;background:var(--s3);border:1px solid var(--dim);color:var(--muted);border-radius:var(--rsm);padding:9px;font-size:13px;font-weight:600;cursor:pointer;text-align:center}
.op-btn.on-in{background:rgba(39,174,96,.12);border-color:var(--green);color:var(--green)}
.op-btn.on-out{background:rgba(231,76,60,.12);border-color:var(--red);color:var(--red)}
.btn-p{background:var(--wine);color:#fff;border:none;border-radius:var(--r);padding:13px;font-size:14px;font-weight:700;cursor:pointer;width:100%}
.btn-p:active{background:var(--wine2)}
.btn-s{background:var(--s3);color:var(--text);border:1px solid var(--border);border-radius:var(--r);padding:11px;font-size:14px;font-weight:600;cursor:pointer;width:100%}
/* Stats */
.st-sec{padding:14px;display:flex;flex-direction:column;gap:12px}
.st-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:13px}
.st-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gold);margin-bottom:10px}
.bar-chart{display:flex;flex-direction:column;gap:7px}
.bar-row{display:flex;align-items:center;gap:7px}
.bar-name{font-size:11px;color:var(--muted);width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.bar-track{flex:1;background:var(--s3);border-radius:3px;height:16px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;min-width:2px;transition:width .5s}
.bar-val{font-size:11px;font-weight:700;width:52px;text-align:right;flex-shrink:0}
.rank-list{display:flex;flex-direction:column;gap:5px}
.rank-item{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--s2);border-radius:var(--rsm)}
.rn{font-size:16px;font-weight:700;color:var(--dim);min-width:22px}
.rn.r1{color:var(--gold)}
.rn.r2{color:var(--muted)}
.rn.r3{color:#8B6914}
.rname{flex:1;font-size:13px;font-weight:600}
.rval{font-size:13px;font-weight:700;color:var(--gold)}
.warn-list{display:flex;flex-direction:column;gap:5px}
.warn-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:var(--rsm);background:var(--s2)}
/* Log */
.log-sec{padding:10px;display:flex;flex-direction:column;gap:8px}
.fbar{display:flex;gap:6px;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch}
.fbar::-webkit-scrollbar{display:none}
.fchip{background:var(--s2);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer}
.fchip.on{background:var(--wine);border-color:var(--wine);color:#fff}
.log-entry{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;display:flex;gap:9px;align-items:flex-start}
.le-ico{font-size:18px;flex-shrink:0;margin-top:1px}
.le-body{flex:1;min-width:0}
.le-title{font-size:13px;font-weight:600}
.le-meta{font-size:11px;color:var(--muted);margin-top:2px}
.le-amt{font-size:15px;font-weight:700;flex-shrink:0}
.le-amt.pos{color:var(--green)}
.le-amt.neg{color:var(--red)}
.le-amt.neu{color:var(--muted)}
/* AI Chat */
.ai-sec{display:flex;flex-direction:column;height:100%}
.ai-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px;-webkit-overflow-scrolling:touch}
.ai-msg{max-width:85%;border-radius:16px;padding:10px 13px;font-size:13px;line-height:1.5}
.ai-msg.user{background:var(--wine);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.ai-msg.bot{background:var(--s2);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;border:1px solid var(--border)}
.ai-msg.bot .bot-label{font-size:10px;color:var(--gold);font-weight:700;letter-spacing:.5px;margin-bottom:5px}
.ai-input-row{display:flex;gap:8px;padding:10px 12px;padding-bottom:calc(10px + env(safe-area-inset-bottom));background:var(--s2);border-top:1px solid var(--border);flex-shrink:0}
.ai-input{flex:1;background:var(--s3);border:1px solid var(--dim);border-radius:22px;color:var(--text);font-size:14px;padding:10px 16px;resize:none;height:42px}
.ai-input:focus{outline:none;border-color:var(--gold)}
.ai-send{background:var(--wine);border:none;border-radius:22px;color:#fff;font-size:16px;width:42px;height:42px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-send:active{background:var(--wine2)}
.ai-quick{display:flex;gap:6px;padding:0 12px 8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.ai-quick::-webkit-scrollbar{display:none}
.ai-qbtn{background:var(--s3);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:5px 12px;font-size:11px;white-space:nowrap;cursor:pointer;font-weight:600}
.ai-qbtn:active{background:var(--dim);color:var(--text)}
/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:flex-end;backdrop-filter:blur(4px)}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:var(--rlg) var(--rlg) 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:18px 14px calc(18px + env(safe-area-inset-bottom))}
.modal-title{font-family:Georgia,serif;font-size:18px;color:var(--gold);margin-bottom:14px}
.modal-form{display:flex;flex-direction:column;gap:10px}
/* Scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .18s ease-out}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<!-- ── LOGIN OVERLAY ── -->
<div id="sb-login-overlay" style="position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--s1);border:1px solid rgba(200,168,75,.35);border-radius:20px;padding:28px 24px;width:100%;max-width:320px;display:flex;flex-direction:column;gap:16px;text-align:center">
    <div style="font-size:48px">🍷</div>
    <div style="font-family:Georgia,serif;font-size:20px;color:var(--gold)">Święto Wina</div>
    <!-- Login: email + hasło -->
    <div id="sb-step1" style="display:flex;flex-direction:column;gap:10px">
      <input id="sb-email-input" type="email" placeholder="twoj@email.com" style="width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text);font-size:15px;padding:12px;outline:none;text-align:center" onkeydown="if(event.key==='Enter')document.getElementById('sb-pass-input').focus()">
      <input id="sb-pass-input" type="password" placeholder="hasło" style="width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text);font-size:15px;padding:12px;outline:none;text-align:center" onkeydown="if(event.key==='Enter')sbLogin()">
      <button id="sb-send-btn" onclick="sbLogin()" style="background:var(--wine);border:none;color:#fff;border-radius:var(--rsm);padding:13px;font-size:14px;font-weight:700;cursor:pointer">Zaloguj się →</button>
      <div style="display:flex;align-items:center;gap:8px;margin:2px 0"><div style="flex:1;height:1px;background:var(--border)"></div><span style="font-size:11px;color:var(--muted)">lub</span><div style="flex:1;height:1px;background:var(--border)"></div></div>
      <button onclick="sbOfflineMode()" style="background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:var(--rsm);padding:11px;font-size:13px;font-weight:600;cursor:pointer">📴 Tryb offline (bez synchronizacji)</button>
    </div>
    <div id="sb-login-err" style="display:none;font-size:12px;color:var(--red);line-height:1.4"></div>
  </div>
</div>

<div id="app">
  <div id="hdr">
    <div class="logo">🍷 Święto Wina</div>
    <div id="net-badge" onclick="sbSyncNow()" title="Status połączenia" style="font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;cursor:pointer;background:#1a3a1a;color:var(--green);border:1px solid var(--green);white-space:nowrap;transition:all .3s">📡 ONLINE</div>
    <div class="hdr-btns">
      <button class="ibtn" id="theme-btn" onclick="toggleTheme()" title="Tryb dzień/noc">🌙</button>
      <button class="ibtn" onclick="doDelivery()" title="Dostawa">📦</button>
      <button class="ibtn" onclick="doSettings()" title="Ustawienia">⚙️</button>
    </div>
  </div>
  <div id="offline-bar" style="display:none;background:#3a2a00;border-bottom:1px solid #7a5500;padding:7px 14px;font-size:12px;color:#f0c060;display:none;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0">
    <span>📴 Tryb offline — dane zapisywane lokalnie</span>
    <button onclick="sbSyncNow()" style="background:#7a5500;border:none;color:#f0c060;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer">🔄 Synchronizuj</button>
  </div>
  <div id="cnt"></div>
  <nav id="nav">
    <button class="ni on" id="tab-home"    onclick="go('home')">   <span class="ic">🍷</span>Wina</button>

function sbInit() {
  try {
    _sb = window.supabase.createClient(SB_URL, SB_KEY);

    console.error('Supabase init error:', e);
    sbHideOverlay();
    return;
  }

  // Timeout: jeśli Supabase nie odpowie w 4 sekundy → tryb offline
  var initDone = false;
  var offlineTimer = setTimeout(function() {
    if (!initDone) {
      initDone = true;
      console.warn('Supabase timeout — tryb offline');
      sbHideOverlay();
      sbShowOfflineBar(true);
      toast('📴 Brak połączenia — tryb offline');
    }
  }, 4000);

  _sb.auth.getSession().then(function(res) {
    if (initDone) return;
    initDone = true;
    clearTimeout(offlineTimer);
    var session = res.data && res.data.session;
    if (session) {
      SB_USER = session.user;
      sbCheckAccess();
    } else {
      sbShowLogin();
    }
  }).catch(function() {
    if (initDone) return;
    initDone = true;
    clearTimeout(offlineTimer);
    sbHideOverlay();
  });

  _sb.auth.onAuthStateChange(function(event, session) {
    if ((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session) {
      SB_USER = session.user;
      sbCheckAccess();
    } else if (event === 'SIGNED_OUT') {
      SB_USER = null;
      sbShowLogin();
    }
  });
}

function sbCheckAccess() {
  if (!_sb || !SB_USER) { sbShowLogin(); return; }
  var userEmail = (SB_USER.email || '').toLowerCase();
  // Fallback: admin zawsze ma dostęp
  if (userEmail === SB_ADMIN.toLowerCase()) {
    SB_USER.is_admin = true;
    sbHideOverlay();
    sbLoadData();
    srvDot('on');
    return;
  }
  _sb.from('allowed_users').select('is_admin').eq('email', userEmail).maybeSingle()
    .then(function(res) {
      if (res.error) { console.error('sbCheckAccess error:', res.error); sbShowAccessDenied(); return; }
      if (!res.data) { sbShowAccessDenied(); return; }
      SB_USER.is_admin = res.data.is_admin;
      sbHideOverlay();
      sbLoadData();
      srvDot('on');
    })
    .catch(function(e) { console.error('sbCheckAccess catch:', e); sbShowAccessDenied(); });
}

function sbLoadData() {
  if (!_sb) return;

    _sb.from('wines').select('*'),
    _sb.from('days').select('*')

    var winesRes = results[0];
    var daysRes  = results[1];

    // Scal wina: Supabase jest kanoniczne
    if (winesRes.data && winesRes.data.length > 0) {
      var sbWines = winesRes.data.map(function(r){ return r.data; });
      S.wines = sbWines.map(migrateWine);
    }

    // Scal dni: merge lokalnych + Supabase (Supabase wygrywa przy konflikcie id)
    if (daysRes.data && daysRes.data.length > 0) {
      var sbDays = daysRes.data.map(function(r){ return r.day_data; });
      var merged = {};
      (S.dayHistory || []).forEach(function(d){ merged[d.id] = d; });
      sbDays.forEach(function(d){ merged[d.id] = d; });
      S.dayHistory = Object.values(merged).sort(function(a,b){ return (a.ts||0)-(b.ts||0); });
      try { localStorage.setItem('sw_v3', JSON.stringify(S)); } catch(e){}
    }
    renderTab();
  }).catch(function(e) {
    console.error('sbLoadData error:', e);
    srvDot('err');
    renderTab();
  });
}

function sbLogin() {
  if (!_sb) return;
  var emailEl = document.getElementById('sb-email-input');
  var passEl  = document.getElementById('sb-pass-input');
  if (!emailEl || !passEl) return;
  var email = emailEl.value.trim().toLowerCase();
  var pass  = passEl.value;
  if (!email || !email.includes('@')) { sbSetErr('Wpisz poprawny adres e-mail'); return; }
  if (!pass || pass.length < 6) { sbSetErr('Hasło musi mieć min. 6 znaków'); return; }
  var btn = document.getElementById('sb-send-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Logowanie...'; }
  sbSetErr('');
  // Próbuj zalogować, jeśli brak konta — zarejestruj
  _sb.auth.signInWithPassword({ email: email, password: pass })
    .then(function(res) {
      if (res.error) throw res.error;
      // onAuthStateChange obsłuży resztę
    })
    .catch(function(e) {
      var msg = (e.message || '').toLowerCase();
      if (msg.includes('invalid') || msg.includes('not found') || msg.includes('credentials')) {
        // Brak konta — zarejestruj (dostęp sprawdzony po zalogowaniu przez sbCheckAccess)
        return _sb.auth.signUp({ email: email, password: pass })
          .then(function(r2) {
            if (r2.error) {
              if ((r2.error.message||'').toLowerCase().includes('already')) {
                sbSetErr('Nieprawidłowe hasło');
              } else {
                sbSetErr('Błąd: ' + r2.error.message);
              }
              if (btn) { btn.disabled = false; btn.textContent = 'Zaloguj się →'; }
            }
          });
      }
      sbSetErr('Błąd: ' + (e.message || 'Spróbuj ponownie'));
      if (btn) { btn.disabled = false; btn.textContent = 'Zaloguj się →'; }
    });
}

      S = JSON.parse(r);
      if (!S.wines) S.wines = CATALOG.map(mkWine);
      S.wines = S.wines.map(migrateWine);
      if (!S.glasses) S.glasses = {issued:0, returned:0};
      if (S.glasses.washed === undefined) S.glasses.washed = 0;
      if (S.glasses.broken === undefined) S.glasses.broken = 0;
      if (!S.bags) S.bags = {sold:0, rev:0};
      if (!S.dayHistory) S.dayHistory = [];
      if (!S.cash) S.cash = {initial: INITIAL_CASH, ops:[], dn:{}};
      if (S.cash.initial === undefined) S.cash.initial = INITIAL_CASH;
      if (!S.log) S.log = [];
    } else { S = defState(); }
  } catch(e) { S = defState(); }
}

// HELPERS
// ─────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(n) { return Number(n||0).toFixed(2).replace('.',',') + ' zł'; }
function fmtN(n) { return Number(n||0).toFixed(2).replace('.',','); }
function fmtTime(ts) {
  var d = new Date(ts);
  var dd = String(d.getDate()).padStart(2,'0');
  var mm = String(d.getMonth()+1).padStart(2,'0');
  var hh = String(d.getHours()).padStart(2,'0');
  var mi = String(d.getMinutes()).padStart(2,'0');
  return dd+'.'+mm+' '+hh+':'+mi;
}
function uid() { return 'i'+Date.now()+Math.random().toString(36).slice(2,5); }
function fmtCartons(bl) {
  if (!CARTON_SIZE || CARTON_SIZE < 1) return bl + ' but.';
  var k = Math.floor(bl / CARTON_SIZE);
  var r = bl % CARTON_SIZE;
  if (k === 0) return bl + ' but.';
  if (r === 0) return k + ' kart. (' + bl + ' but.)';
  return k + ' kart. + ' + r + ' but. (' + bl + ' łącznie)';
}
function toast(msg, ms) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(TOAST_T);
  TOAST_T = setTimeout(function(){ el.classList.remove('show'); }, ms||2000);
  // Dotykowy feedback na telefonie/tablecie — mocniejszy przy ostrzeżeniu
  if (navigator.vibrate) navigator.vibrate(/[⚠️❌🚫]/.test(msg) ? [30,40,30] : 14);
}

// COMPUTED
// ─────────────────────────────────────────────
function bottlesLeft(w) { return Math.floor(w.ml / BOTTLE_ML); }
function tastingsLeft(w) { return Math.floor(w.ml / TASTING_ML); }
function totalDg()  { return S.wines.reduce(function(s,w){ return s+w.dg; }, 0); }
function totalBt()  { return S.wines.reduce(function(s,w){ return s+w.bt; }, 0); }
function totalRev() { return S.wines.reduce(function(s,w){ return s+w.rev; }, 0) + ((S.bags&&S.bags.rev)||0); }
function depColl()  { return S.glasses.issued * DEPOSIT_AMT; }
function depRet()   { return S.glasses.returned * DEPOSIT_AMT; }
function depBal()   { return depColl() - depRet(); }
function outside()  { return S.glasses.issued - S.glasses.returned; }
function dirty()    { return S.glasses.returned - (S.glasses.washed||0); }
function available(){ return TOTAL_GLASSES - S.glasses.issued + (S.glasses.washed||0); }
function opsBalance(){ return S.cash.ops.reduce(function(s,o){ return s + (o.type==='wpłata'?o.amt:-o.amt); }, 0); }
function cashInitial(){ return S.cash.initial !== undefined ? S.cash.initial : INITIAL_CASH; }
function expectedCash(){ return cashInitial() + totalRev() + opsBalance(); } // kaucje NIE wchodzą do kasy
function countedCash(){
  return DENOMS.reduce(function(s,d){ return s + (S.cash.dn[d.k]||0)*d.v; }, 0);
}

function stockColor(bl) {
  if (bl > 6) return 'var(--green)';
  if (bl >= 4) return 'var(--yellow)';
  if (bl >= 2) return 'var(--orange)';
  if (bl === 1) return 'var(--red)';
  return '#b04040';
}

// SALE ACTIONS
// ─────────────────────────────────────────────
var TASTINGS_PER_BOTTLE = BOTTLE_ML / TASTING_ML; // 15
function sellDg(id) {
  var w = S.wines.find(function(x){ return x.id===id; });
  if (!w) return;
  if (w.ml < TASTING_ML) { toast('⚠️ Brak wina w butelce!'); return; }
  w.ml -= TASTING_ML;
  w.dg++;
  var price = applyDiscount(TASTING_PRICE);
  w.rev += price;
  var extra = {pay: PAY_TYPE};
  if (DISCOUNT.active && price !== TASTING_PRICE) extra.discount = TASTING_PRICE - price;
  addLog('degustacja', w.name, 1, price, extra);
  // Auto-zamknięcie po 15 kieliszkach z bieżącej butelki
  var dgFromCurrent = w.dg - w.dgAtLastClose;
  if (dgFromCurrent >= TASTINGS_PER_BOTTLE) {
    closeBottle(id);
    toast('🍾 Butelka ' + (w.closedBottles.length) + ' automatycznie zamknięta — zaczyna się nowa!', 4000);
    return;
  }
  var discStr = DISCOUNT.active && price !== TASTING_PRICE ? ' (rabat −' + fmtN(TASTING_PRICE-price) + ' zł)' : '';
  toast('🥂 Degustacja +' + fmt(price) + discStr);
  save(); renderTab();
}
function undoDg(id) {
  var w = S.wines.find(function(x){ return x.id===id; });
  if (!w || w.dg === 0) { toast('Brak degustacji do cofnięcia'); return; }
  // Cofnij ostatni wpis degustacji tego wina żeby zachować realną kwotę
  var lastDg = null;
  for (var i=0; i<S.log.length; i++) {
    if (S.log[i].type==='degustacja' && S.log[i].wine===w.name) { lastDg=S.log[i]; break; }
  }
  var undoAmt = lastDg ? lastDg.amt : TASTING_PRICE;
  w.ml += TASTING_ML;
  w.dg--;
  w.rev -= undoAmt;
  addLog('korekta', w.name, -1, -undoAmt, {sub:'dg'});
  toast('↩️ Cofnięto degustację');
  save(); renderTab();
}
function sellBt(id) {
  var w = S.wines.find(function(x){ return x.id===id; });
  if (!w) return;
  if (w.ml < BOTTLE_ML) { toast('⚠️ Brak pełnej butelki!'); return; }
  w.ml -= BOTTLE_ML;
  w.bt++;
  var btPrice = applyDiscount(w.pb);
  w.rev += btPrice;
  var btExtra = {pay: PAY_TYPE};
  if (DISCOUNT.active && btPrice !== w.pb) btExtra.discount = w.pb - btPrice;
  addLog('butelka', w.name, 1, btPrice, btExtra);
  var btDiscStr = DISCOUNT.active && btPrice !== w.pb ? ' (rabat −' + fmtN(w.pb-btPrice) + ' zł)' : '';
  toast('🍾 Butelka +' + fmt(btPrice) + btDiscStr);
  save(); renderTab();
}
function undoBt(id) {
  var w = S.wines.find(function(x){ return x.id===id; });
  if (!w || w.bt === 0) { toast('Brak butelek do cofnięcia'); return; }

    if (S.log[i].type==='butelka' && S.log[i].wine===w.name) { lastBt=S.log[i]; break; }
  }
  var undoAmtBt = lastBt ? lastBt.amt : w.pb;
  w.ml += BOTTLE_ML;
  w.bt--;
  w.rev -= undoAmtBt;

// ─ Punktacja ─
function winePoints(pb) {
  var minP = 68, maxP = 78, minPts = 15, maxPts = 17;
  if (maxP === minP) return minPts;
  return Math.round(minPts + (pb - minP) / (maxP - minP) * (maxPts - minPts));
}

function closeBottle(id) {
  var w = S.wines.find(function(x){ return x.id===id; });
  if (!w) return;
  var tastingsFromThisBottle = w.dg - w.dgAtLastClose;
  var trackedMl = tastingsFromThisBottle * TASTING_ML;
  // Korekta magazynu: butelka zużyta fizycznie = BOTTLE_ML, system odliczył trackedMl
  // jeśli lano więcej niż 50ml → trackedMl < BOTTLE_ML → korektaMl > 0 (odejmij resztę)
  var mlCorrection = BOTTLE_ML - trackedMl;
  var correctionApplied = 0;
  if (mlCorrection !== 0) {
    var before = w.ml;
    w.ml = Math.max(0, w.ml - mlCorrection);
    correctionApplied = before - w.ml;
  }
  var avgMl = tastingsFromThisBottle > 0 ? Math.round((BOTTLE_ML / tastingsFromThisBottle) * 10) / 10 : 0;
  var record = {ts: Date.now(), tastings: tastingsFromThisBottle, avgMl: avgMl, mlCorrection: correctionApplied};
  w.closedBottles.push(record);
  w.dgAtLastClose = w.dg;
  addLog('butelka_zamknięta', w.name, tastingsFromThisBottle, 0);
  var corrStr = correctionApplied !== 0
    ? ' · korekta magazynu: ' + (correctionApplied > 0 ? '−' : '+') + Math.abs(Math.round(correctionApplied)) + ' ml'
    : '';
  var msg = tastingsFromThisBottle > 0
    ? '🫙 ' + w.name + ' — butelka zamknięta. ' + tastingsFromThisBottle + ' kieliszków, śr. ' + avgMl + ' ml/kiel.' + corrStr
    : '🫙 ' + w.name + ' — butelka zamknięta (0 kieliszków z tej butelki)';
  toast(msg, 5000);
  save(); renderTab();
}

function applyDiscount(price) {
  if (!DISCOUNT.active || DISCOUNT.value <= 0) return price;
  if (DISCOUNT.type === '%') return Math.round(price * (1 - DISCOUNT.value/100) * 100) / 100;
  return Math.max(0, Math.round((price - DISCOUNT.value) * 100) / 100);
}

  h += '<button id="disc-zl" onclick="DISCOUNT.type=\'zł\';discUpdate()" style="flex:1;padding:8px;border-radius:8px;border:2px solid ' + (!pctAct?'var(--wine)':'var(--border)') + ';background:' + (!pctAct?'rgba(139,26,46,.2)':'transparent') + ';color:' + (!pctAct?'var(--wine)':'var(--muted)') + ';font-weight:700;cursor:pointer;font-size:13px">zł Kwota</button>';

  if (DISCOUNT.active) h += '<button onclick="DISCOUNT.active=false;DISCOUNT.value=0;document.getElementById(\'disc-m\').remove();renderTab();toast(\'Rabat wyłączony\')" style="background:transparent;color:var(--red);border:1px solid rgba(231,76,60,.4);border-radius:10px;padding:9px;font-size:13px;font-weight:700;cursor:pointer">❌ Wyłącz</button>';

function discUpdate() {
  var t = DISCOUNT.type;
  // Aktualizuj wygląd przycisków % / zł
  var bPct = document.getElementById('disc-pct');
  var bZl  = document.getElementById('disc-zl');
  if (bPct && bZl) {
    bPct.style.borderColor = t==='%' ? 'var(--wine)' : 'var(--border)';
    bPct.style.background  = t==='%' ? 'rgba(139,26,46,.2)' : 'transparent';
    bPct.style.color       = t==='%' ? 'var(--wine)' : 'var(--muted)';
    bZl.style.borderColor  = t==='zł' ? 'var(--wine)' : 'var(--border)';
    bZl.style.background   = t==='zł' ? 'rgba(139,26,46,.2)' : 'transparent';
    bZl.style.color        = t==='zł' ? 'var(--wine)' : 'var(--muted)';
  }
  var v = parseFloat(document.getElementById('disc-val').value)||0;
  var prev = document.getElementById('disc-preview');
  if (!prev) return;
  if (v <= 0) { prev.textContent = 'Wpisz wartość'; return; }
  var dgP = parseFloat((document.getElementById('disc-dg-price')||{}).value) || TASTING_PRICE;
  var btP = parseFloat((document.getElementById('disc-bt-price')||{}).value) || 78;
  var exDg = applyDiscountCalc(dgP, t, v);
  var exBt = applyDiscountCalc(btP, t, v);

}
function applyDiscountCalc(price, type, value) {
  if (type === '%') return Math.round(price * (1 - value/100) * 100) / 100;
  return Math.max(0, Math.round((price - value) * 100) / 100);
}
function confirmDiscount() {
  var v = parseFloat(document.getElementById('disc-val').value)||0;
  if (v <= 0) { toast('Wpisz wartość rabatu'); return; }
  DISCOUNT.active = true; DISCOUNT.value = v;
  document.getElementById('disc-m').remove();
  renderTab();
  toast('🏷️ Rabat ' + v + (DISCOUNT.type==='%'?'%':' zł') + ' aktywny');
}

function openOrder() {
  if (ZAMOWIENIE.active) { showOrderModal(); return; }
  ZAMOWIENIE = {active: true, items: [], payType: PAY_TYPE};
  toast('🛒 Zamówienie otwarte — dodaj pozycje z kart win');
  renderTab();

function cancelOrder() {
  var cnt = ZAMOWIENIE.items.reduce(function(s,i){ return s+i.qty; }, 0);
  if (cnt > 0 && !confirm('Anulować zamówienie? (' + cnt + ' poz.)')) return;
  ZAMOWIENIE = {active: false, items: [], payType: 'gotówka'};
  var m = document.getElementById('ord-m');
  if (m) m.remove();
  toast('❌ Zamówienie anulowane');
  renderTab();
}

function ordChange(id, type, delta) {
  var idx = -1;
  for (var i=0; i<ZAMOWIENIE.items.length; i++) {
    if (ZAMOWIENIE.items[i].id===id && ZAMOWIENIE.items[i].type===type) { idx=i; break; }
  }
  if (delta > 0) {
    if (idx !== -1) {
      ZAMOWIENIE.items[idx].qty++;
    } else if (id === 'bag') {
      ZAMOWIENIE.items.push({id:'bag', name:'Torba materiałowa', type:'bag', qty:1, price:BAG_PRICE});
    } else {
      var w2 = S.wines.find(function(x){ return x.id===id; });
      if (!w2) return;
      var price2 = type === 'dg' ? TASTING_PRICE : w2.pb;
      ZAMOWIENIE.items.push({id: id, name: w2.name, type: type, qty: 1, price: price2});
    }
  } else {
    if (idx === -1) return;
    if (ZAMOWIENIE.items[idx].qty > 1) ZAMOWIENIE.items[idx].qty--;
    else ZAMOWIENIE.items.splice(idx, 1);
  }
  var m = document.getElementById('ord-m');
  if (m) { m.remove(); showOrderModal(); }
  renderTab();
}

function showOrderModal() {

function confirmOrder() {
  if (ZAMOWIENIE.items.length === 0) { toast('Brak pozycji w zamówieniu'); return; }
  var ordPay = ZAMOWIENIE.payType;
  var totalProc = 0;
  var totalAmtO = 0;
  ZAMOWIENIE.items.forEach(function(item) {
    var w3 = S.wines.find(function(x){ return x.id===item.id; });
    if (!w3) return;
    for (var i=0; i<item.qty; i++) {
      if (item.type === 'dg') {
        if (w3.ml < TASTING_ML) break;
        w3.ml -= TASTING_ML;
        w3.dg++;
        var p3 = applyDiscount(TASTING_PRICE);
        w3.rev += p3; totalAmtO += p3; totalProc++;
        addLog('degustacja', w3.name, 1, p3, {pay: ordPay});
        var dgCur = w3.dg - w3.dgAtLastClose;
        if (dgCur >= TASTINGS_PER_BOTTLE) {
          var t3 = w3.dg - w3.dgAtLastClose;
          var tr3 = t3 * TASTING_ML;
          var cor3 = BOTTLE_ML - tr3;
          if (cor3 !== 0) w3.ml = Math.max(0, w3.ml - cor3);
          w3.closedBottles.push({ts:Date.now(), tastings:t3, avgMl: t3>0?Math.round((BOTTLE_ML/t3)*10)/10:0, mlCorrection:cor3>0?cor3:0});
          w3.dgAtLastClose = w3.dg;
          addLog('butelka_zamknięta', w3.name, t3, 0);
        }
      } else if (item.type === 'bt') {
        if (w3.ml < BOTTLE_ML) break;
        w3.ml -= BOTTLE_ML;
        w3.bt++;
        var bp3 = applyDiscount(w3.pb);
        w3.rev += bp3; totalAmtO += bp3; totalProc++;
        addLog('butelka', w3.name, 1, bp3, {pay: ordPay});
      }
    }
    if (item.type === 'bag') {
      if (!S.bags) S.bags = {sold:0, rev:0};
      for (var bi2=0; bi2<item.qty; bi2++) {
        var bagP2 = applyDiscount(BAG_PRICE);
        S.bags.sold++;
        S.bags.rev += bagP2;
        totalAmtO += bagP2;
        totalProc++;
        addLog('torba', null, 1, bagP2, {pay: ordPay});
      }
    }
  });
  var m3 = document.getElementById('ord-m');
  if (m3) m3.remove();
  ZAMOWIENIE = {active: false, items: [], payType: 'gotówka'};
  save(); renderTab();
  toast('✅ Zamówienie: ' + totalProc + ' poz. · +' + fmtN(totalAmtO) + ' zł', 4000);
}

function undoBag() {

  if (S.glasses.issued === 0) return;

function undoReturn() {

function filterWines(q) {
  // Czyste pokaż/ukryj na DOM — BEZ re-renderu, więc focus i kursor zostają w polu.
  window._WINE_SEARCH = q;
  window._prevWineSearch = q;
  var srch = (q || '').toLowerCase();
  document.querySelectorAll('.sec-wrap').forEach(function(sec) {
    var type    = sec.getAttribute('data-type');
    var body    = sec.querySelector('.sec-body');
    var summary = sec.querySelector('.sec-summary');
    var arrow   = sec.querySelector('.sec-arrow');
    var cards   = sec.querySelectorAll('.wc[data-wine-name]');
    if (srch) {
      // Szukanie: pokaż pasujące karty, rozwiń sekcje z trafieniami, ukryj puste
      var anyVisible = false;
      cards.forEach(function(card) {
        var name = card.getAttribute('data-wine-name') || '';
        var show = name.indexOf(srch) !== -1;
        card.style.display = show ? '' : 'none';
        if (show) anyVisible = true;
      });
      sec.style.display = anyVisible ? '' : 'none';
      if (body)    body.style.display = anyVisible ? 'flex' : 'none';
      if (summary) summary.style.display = 'none';
      if (arrow)   arrow.textContent = '▼';
    } else {
      // Wyczyszczone: przywróć stan zwinięcia z COL_SEC — bez re-renderu
      sec.style.display = '';
      cards.forEach(function(card) { card.style.display = ''; });
      var collapsed = COL_SEC[type] !== false;
      if (body)    body.style.display = collapsed ? 'none' : 'flex';
      if (summary) summary.style.display = collapsed ? '' : 'none';
      if (arrow)   arrow.textContent = collapsed ? '▶' : '▼';
    }
  });
}

    różowe:  {label:'🌸 Wina różowe',  accent:'#d4558a', bg:'rgba(212,85,138,.07)',  border:'rgba(212,85,138,.25)'},
    czerwone:{label:'🔴 Wina czerwone',accent:'#b02a42', bg:'rgba(176,42,66,.08)',   border:'rgba(176,42,66,.3)'}
  };

  types.forEach(function(type) {
    var srch = (window._WINE_SEARCH||'').toLowerCase();
    var wines = S.wines.filter(function(w){
      if (w.type !== type) return false;
      if (srch && w.name.toLowerCase().indexOf(srch) === -1) return false;
      return true;
    });
    if (wines.length === 0) return; // ukryj sekcję jeśli brak wyników
    var cfg = typeConfig[type];
    var secCollapsed = srch ? false : (COL_SEC[type] !== false); // przy szukaniu rozwiń
    var totalDgSec = wines.reduce(function(s,w){ return s+w.dg; }, 0);
    var totalBtSec = wines.reduce(function(s,w){ return s+w.bt; }, 0);
    var totalRevSec = wines.reduce(function(s,w){ return s+w.rev; }, 0);
    var closedDgSec = wines.reduce(function(s,w){ return s + w.closedBottles.length; }, 0);
    var anyCurrentSec = wines.some(function(w){ return (w.dg - w.dgAtLastClose) > 0; });
    var dgButSecStr = closedDgSec > 0
      ? (anyCurrentSec ? closedDgSec + '+1 but.' : closedDgSec + ' but.')
      : (totalDgSec > 0 ? totalDgSec + ' kiel.' : '—');

    // Nagłówek sekcji — klikalny
    html += '<div class="sec-wrap" data-type="' + type + '">';
    html += '<div onclick="toggleSec(\'' + type + '\')" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;font-size:12px;font-weight:700;color:' + cfg.accent + ';letter-spacing:.5px;text-transform:uppercase;background:' + cfg.bg + ';border:1px solid ' + cfg.border + ';border-radius:10px">';
    html += '<span>' + cfg.label + ' (' + wines.length + ')</span>';
    html += '<span style="display:flex;align-items:center;gap:12px">';
    // Podsumowanie sekcji gdy zwinięta — zawsze w DOM, ukrywane gdy rozwinięta
    html += '<span class="sec-summary" style="font-size:11px;font-weight:600;opacity:.7;display:' + (secCollapsed ? '' : 'none') + '">🍾' + totalBtSec + ' spr. · 🥂' + dgButSecStr + ' dg · ' + fmtN(totalRevSec) + ' zł</span>';
    html += '<span class="sec-arrow" style="font-size:16px;opacity:.6">' + (secCollapsed ? '▶' : '▼') + '</span>';
    html += '</span>';
    html += '</div>';

    // Karty ZAWSZE w DOM — zwinięcie ukrywa przez CSS (umożliwia filtrowanie bez re-renderu)
    html += '<div class="sec-body" style="display:' + (secCollapsed ? 'none' : 'flex') + ';flex-direction:column;gap:6px;margin-top:2px">';
    wines.forEach(function(w) {
      html += buildWineCard(w);
    });
    html += '</div>';
    html += '<div style="height:6px"></div>';
    html += '</div>'; // sec-wrap
  });

  html += '</div>';
  document.getElementById('cnt').innerHTML = html;
  // Po pełnym renderze przywróć aktywny filtr (np. po sprzedaży podczas szukania)
  if (window._WINE_SEARCH) filterWines(window._WINE_SEARCH);
}

var WINE_BG = {
  białe:    {bg:'#272210', border:'rgba(220,190,90,.5)',  name:'#e8d48a'},
  różowe:   {bg:'#231020', border:'rgba(210,100,150,.5)', name:'#e8a0c0'},
  czerwone: {bg:'#220e10', border:'rgba(190,50,65,.55)',  name:'#e89090'}
};

function buildWineCard(w) {
  var bl = bottlesLeft(w);
  var tl = tastingsLeft(w);
  var color = stockColor(bl);
  var warn = bl <= 3;
  var out = bl === 0;
  var wbg = WINE_BG[w.type] || {bg:'var(--s1)', border:'var(--border)', name:'var(--text)'};
  var wineCollapsed = COL_WINE[w.id] !== false; // domyślnie zwinięte

  var h = '';
  h += '<div class="wc' + (out?' out':'') + '" data-wine-name="' + w.name.toLowerCase() + '" data-wine-id="' + w.id + '" style="background:' + wbg.bg + ';border-color:' + wbg.border + '">';

  // Pasek nagłówka — zawsze widoczny, klikalny
  h += '<div onclick="toggleWine(\'' + w.id + '\')" style="cursor:pointer;display:flex;align-items:center;padding:10px 12px;gap:10px">';
  h += '<div style="flex:1;min-width:0">';
  h += '<div class="wc-name" style="color:' + wbg.name + ';font-size:14px">' + esc(w.name) + '</div>';
  if (!wineCollapsed) {
    h += '<span class="wc-badge type-' + w.type + '">' + w.type + '</span>';
  } else {
    h += '<div style="font-size:10px;color:var(--muted);margin-top:2px">🥂 ' + w.dg + '  🍾 ' + w.bt + '  · ' + fmtN(w.rev) + ' zł</div>';
  }
  h += '</div>';
  h += '<div style="display:flex;align-items:center;gap:10px">';
  if (warn && !out) h += '<span style="font-size:11px;color:var(--orange)">⚠️' + bl + '</span>';
  if (out)          h += '<span style="font-size:11px;color:var(--red)">❌</span>';
  h += '<div style="text-align:right"><div style="font-size:22px;font-weight:700;color:' + color + ';line-height:1">' + bl + '</div><div style="font-size:9px;color:var(--muted)">but.</div></div>';
  h += '<span style="font-size:14px;color:var(--muted);opacity:.5">' + (wineCollapsed ? '▶' : '▼') + '</span>';
  h += '</div>';
  h += '</div>';

  if (wineCollapsed) {
    h += '</div>';
    return h;
  }

  // Reszta karty — tylko gdy rozwinięta
  h += '<div class="wc-top" style="padding-top:0">';
  h += '<div>';
  h += '<span class="wc-badge type-' + w.type + '">' + w.type + '</span>';
  h += '</div>';
  h += '<div class="wc-stock">';
  h += '<div class="wc-stock-ml" style="color:var(--muted)">' + w.ml + ' ml</div>';
  h += '</div>';
  h += '</div>';

  if (warn && !out) {
    h += '<div class="wc-warn">⚠️ Zostało tylko ' + bl + ' ' + (bl===1?'butelka':bl<=4?'butelki':'butelek') + '!</div>';
  }
  if (out) {
    h += '<div class="wc-warn alarm">❌ BRAK WINA — stan zerowy</div>';
  }

  // Butelki na degustację: zamknięte + bieżąca (jeśli w toku)
  var closedCnt = w.closedBottles.length;
  var dgSinceCloseStats = w.dg - w.dgAtLastClose;
  var currentBottleNum = closedCnt + 1; // numer bieżącej butelki
  var dgButStr;
  if (closedCnt === 0 && dgSinceCloseStats === 0) {
    dgButStr = '—';
  } else if (closedCnt === 0) {
    dgButStr = 'But. 1 (' + dgSinceCloseStats + ' kiel.)';
  } else if (dgSinceCloseStats === 0) {
    dgButStr = closedCnt + ' but.';
  } else {
    dgButStr = closedCnt + ' zam. + but. ' + currentBottleNum;
  }
  h += '<div class="wc-stats">';
  h += '<div class="wc-stat" title="Całe butelki sprzedane klientom"><div class="wc-stat-label">🍾 Sprzedane</div><div class="wc-stat-val">' + w.bt + ' but.</div></div>';
  h += '<div class="wc-stat" title="' + w.dg + ' kieliszków łącznie na degustacjach"><div class="wc-stat-label">🥂 Degustu</div><div class="wc-stat-val" style="font-size:11px;padding-top:2px">' + dgButStr + '</div></div>';
  h += '<div class="wc-stat"><div class="wc-stat-label">💰 Przychód</div><div class="wc-stat-val" style="color:var(--gold)">' + fmtN(w.rev) + ' zł</div></div>';
  h += '<div class="wc-stat"><div class="wc-stat-label">Cena but.</div><div class="wc-stat-val">' + w.pb + ' zł</div></div>';
  h += '</div>';

  // Typ płatności inline + rabat
  var payIcons2 = {gotówka:'💵',karta:'💳',blik:'📱'};
  var discBadge = DISCOUNT.active && DISCOUNT.value > 0 ? ' <span style="color:var(--green);font-size:9px">🏷️−'+DISCOUNT.value+(DISCOUNT.type==='%'?'%':' zł')+'</span>' : '';
  h += '<div style="display:flex;gap:4px;padding:6px 10px;background:rgba(255,255,255,.02);border-top:1px solid var(--border)">';
  ['gotówka','karta','blik'].forEach(function(pt){
    var act = PAY_TYPE===pt;
    h += '<button data-paytype="' + pt + '" onclick="setPay(\'' + pt + '\')" style="flex:1;padding:5px 2px;border-radius:6px;font-size:10px;font-weight:' + (act?'800':'700') + ';cursor:pointer;border:1px solid ' + (act?'var(--wine)':'var(--border)') + ';background:' + (act?'rgba(139,32,50,.28)':'transparent') + ';color:' + (act?'var(--wine2)':'var(--muted)') + '">' + payIcons2[pt] + ' ' + pt.slice(0,3).toUpperCase() + '</button>';
  });
  h += '<button onclick="doDiscount(\'' + w.id + '\')" style="flex:1;padding:5px 4px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid ' + (DISCOUNT.active?'var(--green)':'var(--border)') + ';background:' + (DISCOUNT.active?'rgba(39,174,96,.15)':'transparent') + ';color:' + (DISCOUNT.active?'var(--green)':'var(--muted)') + '">🏷️ ' + (DISCOUNT.active?DISCOUNT.value+(DISCOUNT.type==='%'?'%':' zł'):'RAB') + '</button>';
  h += '</div>';

  h += '<div class="wc-actions">';
  if (ZAMOWIENIE.active) {
    // Tryb zamówienia
    var ordDgQ = 0, ordBtQ = 0;
    for (var oi=0; oi<ZAMOWIENIE.items.length; oi++) {
      if (ZAMOWIENIE.items[oi].id === w.id) {
        if (ZAMOWIENIE.items[oi].type === 'dg') ordDgQ = ZAMOWIENIE.items[oi].qty;
        if (ZAMOWIENIE.items[oi].type === 'bt') ordBtQ = ZAMOWIENIE.items[oi].qty;
      }
    }
    h += '<div class="wc-ag">';
    h += '<div class="ag-label" style="color:var(--gold)">🛒 Degustu ' + TASTING_PRICE + ' zł' + discBadge + '</div>';
    h += '<div class="ag-row">';
    h += '<button class="btn-big btn-minus" onclick="ordChange(\'' + w.id + '\',\'dg\',-1)" ' + (ordDgQ===0?'disabled':'') + '>−</button>';
    h += '<button class="btn-big btn-plus" onclick="ordChange(\'' + w.id + '\',\'dg\',1)" ' + (w.ml<TASTING_ML?'disabled':'') + ' style="' + (ordDgQ>0?'background:rgba(200,168,75,.3);color:var(--gold)':'') + '">' + (ordDgQ>0?'🛒 ×'+ordDgQ:'+ Degustu') + '</button>';
    h += '</div>';
    h += '<div style="font-size:10px;color:var(--muted);margin-top:4px;text-align:center">' + tl + ' porcji</div>';
    h += '</div>';
    h += '<div class="wc-ag">';
    h += '<div class="ag-label" style="color:var(--gold)">🛒 Butelka ' + w.pb + ' zł' + discBadge + '</div>';
    h += '<div class="ag-row">';
    h += '<button class="btn-big btn-minus" onclick="ordChange(\'' + w.id + '\',\'bt\',-1)" ' + (ordBtQ===0?'disabled':'') + '>−</button>';
    h += '<button class="btn-big btn-plus" onclick="ordChange(\'' + w.id + '\',\'bt\',1)" ' + (w.ml<BOTTLE_ML?'disabled':'') + ' style="' + (ordBtQ>0?'background:rgba(200,168,75,.3);color:var(--gold)':'') + '">' + (ordBtQ>0?'🛒 ×'+ordBtQ:'+ Butelka') + '</button>';
    h += '</div>';
    h += '<div style="font-size:10px;color:var(--muted);margin-top:4px;text-align:center">' + bl + ' butelek</div>';
    h += '</div>';
  } else {
    // Tryb normalny
    h += '<div class="wc-ag">';
    h += '<div class="ag-label">🥂 Degustacja ' + TASTING_PRICE + ' zł' + discBadge + '</div>';
    h += '<div class="ag-row">';
    h += '<button class="btn-big btn-minus" onclick="undoDg(\'' + w.id + '\')" ' + (w.dg===0?'disabled':'') + '>−</button>';
    h += '<button class="btn-big btn-plus" onclick="sellDg(\'' + w.id + '\')" ' + (w.ml < TASTING_ML?'disabled':'') + '>+ Degustacja</button>';
    h += '<button onclick="sellDgBulk(\'' + w.id + '\')" style="background:var(--s3);border:1px solid var(--border);color:var(--muted);border-radius:var(--rsm);padding:0 10px;font-size:18px;height:52px;cursor:pointer" title="Wiele na raz">×N</button>';
    h += '</div>';
    h += '<div style="font-size:10px;color:var(--muted);margin-top:4px;text-align:center">' + tl + ' porcji pozostało</div>';
    h += '</div>';
    h += '<div class="wc-ag">';
    h += '<div class="ag-label">🍾 Butelka ' + w.pb + ' zł' + discBadge + '</div>';
    h += '<div class="ag-row">';
    h += '<button class="btn-big btn-minus" onclick="undoBt(\'' + w.id + '\')" ' + (w.bt===0?'disabled':'') + '>−</button>';
    h += '<button class="btn-big btn-plus" onclick="sellBt(\'' + w.id + '\')" ' + (w.ml < BOTTLE_ML?'disabled':'') + '>+ Butelka</button>';
    h += '<button onclick="sellBtBulk(\'' + w.id + '\')" style="background:var(--s3);border:1px solid var(--border);color:var(--muted);border-radius:var(--rsm);padding:0 10px;font-size:18px;height:52px;cursor:pointer" title="Wiele na raz">×N</button>';
    h += '</div>';
    h += '<div style="font-size:10px;color:var(--muted);margin-top:4px;text-align:center">' + bl + ' pełnych butelek</div>';
    h += '</div>';
  }
  h += '</div>';

  // ── Sekcja butelek na degustację ──────────────────────────────
  var dgSinceClose = dgSinceCloseStats;
  h += '<div style="border-top:1px solid var(--border)">';

  // Nagłówek + średnia ogólna
  var allAvgs2 = w.closedBottles.filter(function(cb){ return cb.avgMl > 0; });
  var overallAvg2 = allAvgs2.length > 0
    ? Math.round(allAvgs2.reduce(function(s,cb){ return s + cb.avgMl; }, 0) / allAvgs2.length * 10) / 10
    : 0;
  h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 10px 3px">';
  h += '<span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">🫙 Butelki na degustację</span>';
  if (overallAvg2 > 0) {
    var diff2 = Math.round((overallAvg2 - TASTING_ML) * 10) / 10;
    var dCol2 = diff2 > 0 ? 'var(--orange)' : 'var(--green)';
    h += '<span style="font-size:10px;color:' + dCol2 + ';font-weight:700">śr. ' + overallAvg2 + ' ml ' + (diff2 > 0 ? '▲' : '▼') + Math.abs(diff2) + '</span>';
  }
  h += '</div>';

  // Zamknięte butelki (od 1 do ostatniej)
  var totalClosed2 = w.closedBottles.length;
  w.closedBottles.forEach(function(cb, idx) {
    var bNum = idx + 1;
    var corrTxt2 = cb.mlCorrection && Math.abs(cb.mlCorrection) > 1
      ? ' <span style="color:var(--orange);font-size:10px">(' + (cb.mlCorrection > 0 ? '−' : '+') + Math.abs(Math.round(cb.mlCorrection)) + 'ml)</span>'
      : '';
    h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 10px;font-size:11px;opacity:.8">';
    h += '<span style="color:var(--muted)">But. ' + bNum + '</span>';
    h += '<span style="color:var(--text)">' + cb.tastings + ' kiel.' + corrTxt2 + '</span>';
    h += '<span style="color:var(--gold)">śr. ' + cb.avgMl + ' ml</span>';
    h += '<span style="color:var(--green);font-size:10px;font-weight:700">✓ zamknięta</span>';
    h += '</div>';
  });

  // Bieżąca butelka (zawsze widoczna)
  h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 10px 6px;background:rgba(230,126,34,.07);border-top:1px solid rgba(230,126,34,.2)">';
  h += '<span style="color:var(--orange);font-weight:700;font-size:11px">But. ' + currentBottleNum + ' ▶ w toku</span>';
  h += '<span style="color:var(--text);font-size:12px;font-weight:700">' + dgSinceClose + ' kieliszków</span>';
  h += '<button onclick="closeBottle(\'' + w.id + '\')" style="background:rgba(230,126,34,.2);border:1px solid var(--orange);color:var(--orange);border-radius:var(--rsm);padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer">🫙 Skończyła się</button>';
  h += '</div>';

  h += '</div>';

  h += '</div>';
  return h;
}

  var d = dirty();

  h += '</div>';

  h += '<div class="act-row">';
