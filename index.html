<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Święto Wina — wybierz wersję</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #0f0a14;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #e8dcc8;
    padding: 24px;
  }
  .logo { font-size: 52px; margin-bottom: 12px; }
  h1 { font-family: Georgia, serif; font-size: 26px; color: #c8a84b; margin-bottom: 6px; }
  .sub { font-size: 13px; color: #8a7a6a; margin-bottom: 48px; }
  .cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 700px; }
  .card {
    background: #1a1220;
    border: 1px solid rgba(200,168,75,0.2);
    border-radius: 18px;
    padding: 28px 24px;
    text-align: center;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: transform 0.12s, border-color 0.12s;
    width: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .card:hover { transform: translateY(-3px); border-color: rgba(200,168,75,0.55); }
  .card .icon { font-size: 38px; }
  .card .name { font-size: 15px; font-weight: 700; color: #e8dcc8; }
  .card .desc { font-size: 11px; color: #8a7a6a; line-height: 1.5; }
</style>
</head>
<body>
  <div class="logo">🍷</div>
  <h1>Święto Wina</h1>
  <p class="sub">Wybierz wersję odpowiednią dla Twojego urządzenia</p>
  <div class="cards">
    <a class="card" href="desktop/">
      <div class="icon">🖥️</div>
      <div class="name">Komputer</div>
      <div class="desc">Mac / PC<br>pełny interfejs</div>
    </a>
    <a class="card" href="tablet/">
      <div class="icon">📱</div>
      <div class="name">Tablet</div>
      <div class="desc">iPad / Android<br>wersja dotykowa</div>
    </a>
    <a class="card" href="phone/">
      <div class="icon">📲</div>
      <div class="name">Telefon</div>
      <div class="desc">iPhone / Android<br>tryb kompaktowy</div>
    </a>
  </div>
</body>
</html>
